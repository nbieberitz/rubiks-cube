<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubik's Cube — Live Multiplayer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, serverTimestamp, onDisconnect }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCtcmV8TJzXlDywfMX6hSFnlaTM5QrLdsU",
    authDomain:        "rubik-s-cube-c7d48.firebaseapp.com",
    databaseURL:       "https://rubik-s-cube-c7d48-default-rtdb.firebaseio.com",
    projectId:         "rubik-s-cube-c7d48",
    storageBucket:     "rubik-s-cube-c7d48.firebasestorage.app",
    messagingSenderId: "710255457068",
    appId:             "1:710255457068:web:dca388111672110e7c7289"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const AVATARS = ['🟥','🟦','🟩','🟨','🟧','🟪','⬛','🤍'];
  let myId = sessionStorage.getItem('rubik_id') || Math.random().toString(36).slice(2,9);
  sessionStorage.setItem('rubik_id', myId);

  const cubeRef     = ref(db, 'cube/state');
  const moveCountRef= ref(db, 'cube/moveCount');
  const presenceRef = ref(db, `cube/presence/${myId}`);
  const presenceAll = ref(db, 'cube/presence');
  const recentRef   = ref(db, 'cube/recentMoves');

  let myAvatar = '⬜';
  const snap0 = await new Promise(r => onValue(presenceAll, r, {onlyOnce:true}));
  const taken = new Set(snap0.exists() ? Object.values(snap0.val()).map(u=>u.avatar) : []);
  const free  = AVATARS.filter(a=>!taken.has(a));
  myAvatar = free.length ? free[Math.floor(Math.random()*free.length)]
                         : AVATARS[Math.floor(Math.random()*AVATARS.length)];

  set(presenceRef, {avatar:myAvatar, t:serverTimestamp()});
  onDisconnect(presenceRef).remove();

  window._fb = {db,ref,set,onValue,cubeRef,moveCountRef,presenceAll,recentRef,myId,myAvatar};
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07070f; --panel:#0e0e1c; --border:#1e1e35;
  --glow:#4f6fff; --gold:#d4af37; --text:#c8cee8; --muted:#4a4e72;
  --half:105px; --cell:64px; --gap:4px;
}

html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono',monospace;overflow-x:hidden}

.stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 15%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 45%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 42% 38%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 60%,rgba(255,255,255,.5) 0%,transparent 100%)}

.app{position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:24px 20px 40px;gap:24px}

.header{width:100%;max-width:900px;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:12px}
.title-block h1{font-family:'Orbitron',sans-serif;
  font-size:clamp(1.2rem,3.5vw,2rem);font-weight:900;letter-spacing:.14em;
  color:#fff;text-shadow:0 0 30px rgba(79,111,255,.8)}
.title-block h1 span{color:var(--gold)}
.subtitle{font-size:.65rem;letter-spacing:.2em;color:var(--muted);margin-top:4px}
.status-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live-dot{display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:rgba(0,181,24,.08);border:1px solid rgba(0,181,24,.3);
  border-radius:20px;font-size:.65rem;color:#00e528}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:#00e528;
  animation:pulseDot 1.4s ease infinite}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(0,229,40,.5)}50%{box-shadow:0 0 0 5px rgba(0,229,40,0)}}
.online-count{display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:rgba(79,111,255,.08);border:1px solid rgba(79,111,255,.3);
  border-radius:20px;font-size:.65rem;color:#8aabff}
.my-badge{padding:5px 12px;background:rgba(212,175,55,.08);
  border:1px solid rgba(212,175,55,.3);border-radius:20px;font-size:.7rem;color:var(--gold)}

.overlay{position:fixed;inset:0;z-index:100;background:rgba(7,7,15,.92);
  backdrop-filter:blur(8px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;transition:opacity .4s}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay-icon{font-size:3rem;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-text{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--glow);letter-spacing:.15em}
.overlay-sub{font-size:.7rem;color:var(--muted);max-width:320px;text-align:center;line-height:1.7}

.stage{display:flex;gap:40px;align-items:center;flex-wrap:wrap;justify-content:center}

/* ── 3D CUBE ──────────────────────────────────────────────────────────────── */
.cube-viewport{width:300px;height:300px;perspective:800px;
  display:flex;align-items:center;justify-content:center;cursor:grab}
.cube-viewport.dragging{cursor:grabbing}

.cube-scene{
  width:calc(var(--half)*2);
  height:calc(var(--half)*2);
  transform-style:preserve-3d;
  transform:rotateX(-26deg) rotateY(40deg);
  transition:transform .08s ease;
}

/* face-B: rotateY(180deg) mirrors left-right. JS renders stickers in reversed order (8→0)
   so storage index 0 = top-left-external, 8 = bottom-right-external (natural order). */
.face{
  position:absolute;
  width:calc(var(--half)*2);
  height:calc(var(--half)*2);
  display:grid;
  grid-template-columns:repeat(3,var(--cell));
  grid-template-rows:repeat(3,var(--cell));
  place-content:center;
  gap:var(--gap);
  padding:var(--gap);
  background:#111;
  border:2px solid rgba(255,255,255,.08);
  backface-visibility:visible;
  -webkit-backface-visibility:visible;
}
.face-F{transform:translateZ(var(--half))}
.face-B{transform:rotateY(180deg) translateZ(var(--half))}
.face-R{transform:rotateY( 90deg) translateZ(var(--half))}
.face-L{transform:rotateY(-90deg) translateZ(var(--half))}
.face-U{transform:rotateX( 90deg) translateZ(var(--half))}
.face-D{transform:rotateX(-90deg) translateZ(var(--half))}

.sticker{border-radius:7px;transition:background-color .18s ease;
  box-shadow:inset 0 3px 6px rgba(255,255,255,.25),inset 0 -3px 6px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.5)}
.sticker.flash{animation:sFlash .25s ease}
@keyframes sFlash{0%{transform:scale(1);filter:brightness(1)}50%{transform:scale(.88);filter:brightness(1.6)}100%{transform:scale(1);filter:brightness(1)}}

.move-log-panel{display:flex;flex-direction:column;gap:8px;min-width:180px;max-width:200px}
.move-log-title{font-size:.6rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;text-align:center}
.move-log{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.log-entry{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:8px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:.7rem;animation:sIn .2s ease}
@keyframes sIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.log-avatar{font-size:.85rem}
.log-move{font-family:'Orbitron',sans-serif;font-weight:700;color:#fff;font-size:.75rem;min-width:24px}
.log-you{font-size:.55rem;color:var(--gold);margin-left:auto}
.log-entry.mine{background:rgba(79,111,255,.06);border-color:rgba(79,111,255,.2)}

.info-bar{display:flex;gap:20px;align-items:center;background:var(--panel);
  border:1px solid var(--border);border-radius:12px;padding:10px 22px}
.info-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.info-value{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700;color:#fff}
.info-key{font-size:.58rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.info-sep{width:1px;height:32px;background:var(--border)}
.last-move{font-family:'Orbitron',sans-serif;font-size:.95rem;color:var(--glow);
  min-width:44px;text-align:center;text-shadow:0 0 12px rgba(79,111,255,.6)}
.last-move.fade{animation:fMove .5s ease}
@keyframes fMove{0%{transform:translateY(-6px);opacity:0}30%{opacity:1}100%{transform:none;opacity:1}}
.solved-badge{font-family:'Orbitron',sans-serif;font-size:.68rem;letter-spacing:.1em;
  padding:5px 14px;border-radius:20px;background:rgba(0,181,24,.12);
  border:1px solid rgba(0,181,24,.4);color:#00e528;display:none}
.solved-badge.show{display:block;animation:pGreen 1.5s ease infinite}
@keyframes pGreen{0%,100%{box-shadow:0 0 6px rgba(0,229,40,.3)}50%{box-shadow:0 0 18px rgba(0,229,40,.7)}}

.controls{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:780px}
.section-title{font-size:.58rem;letter-spacing:.2em;color:var(--muted);
  text-transform:uppercase;text-align:center;margin-bottom:8px}
.move-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;width:100%}

.btn{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.04em;
  border:none;border-radius:10px;cursor:pointer;padding:12px 6px;position:relative;overflow:hidden;
  transition:transform .12s,box-shadow .12s,filter .12s;user-select:none}
.btn:hover{transform:translateY(-2px);filter:brightness(1.15)}
.btn:active{transform:translateY(1px) scale(.96);filter:brightness(.9)}
.btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 60%);border-radius:inherit}

.btn-U {background:linear-gradient(145deg,#ffd600,#c9a800);color:#1a1200;box-shadow:0 4px 16px rgba(255,214,0,.45)}
.btn-Uc{background:linear-gradient(145deg,#c9a800,#8a7200);color:#3a2e00;box-shadow:0 4px 14px rgba(255,214,0,.28)}
.btn-D {background:linear-gradient(145deg,#f0f0f0,#c0c0c0);color:#222;box-shadow:0 4px 16px rgba(200,200,200,.45)}
.btn-Dc{background:linear-gradient(145deg,#c0c0c0,#909090);color:#333;box-shadow:0 4px 14px rgba(200,200,200,.28)}
.btn-F {background:linear-gradient(145deg,#00a015,#005a0c);color:#fff;box-shadow:0 4px 16px rgba(0,160,21,.35)}
.btn-Fc{background:linear-gradient(145deg,#007a10,#003d08);color:#b8ffbf;box-shadow:0 4px 14px rgba(0,160,21,.25)}
.btn-B {background:linear-gradient(145deg,#1565ff,#0a3aaa);color:#fff;box-shadow:0 4px 16px rgba(21,101,255,.4)}
.btn-Bc{background:linear-gradient(145deg,#0a3aaa,#052080);color:#aac4ff;box-shadow:0 4px 14px rgba(21,101,255,.25)}
.btn-R {background:linear-gradient(145deg,#ff7200,#b04e00);color:#fff;box-shadow:0 4px 16px rgba(255,114,0,.4)}
.btn-Rc{background:linear-gradient(145deg,#b04e00,#6a2e00);color:#ffd4a0;box-shadow:0 4px 14px rgba(255,114,0,.25)}
.btn-L {background:linear-gradient(145deg,#e00000,#8a0000);color:#fff;box-shadow:0 4px 16px rgba(220,0,0,.4)}
.btn-Lc{background:linear-gradient(145deg,#8a0000,#4d0000);color:#ffb8b8;box-shadow:0 4px 14px rgba(220,0,0,.25)}

.action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%}
.btn-reset   {background:linear-gradient(145deg,#1f1f3a,#12122a);color:var(--gold);
  border:1px solid rgba(212,175,55,.35);font-size:.75rem;padding:13px}
.btn-scramble{background:linear-gradient(145deg,#2a1f3a,#1a122a);color:#c084fc;
  border:1px solid rgba(192,132,252,.35);font-size:.75rem;padding:13px}
.btn-solve   {background:linear-gradient(145deg,#0a3a2a,#051a12);color:#34d399;
  border:1px solid rgba(52,211,153,.4);font-size:.75rem;padding:13px}
.btn-solve:disabled{opacity:.4;cursor:not-allowed;transform:none!important;filter:none!important}
.btn-solve.solving{background:linear-gradient(145deg,#0a2a3a,#051218);color:#38bdf8;
  border-color:rgba(56,189,248,.4);animation:sPulse 1s ease infinite}
@keyframes sPulse{0%,100%{box-shadow:0 0 8px rgba(52,211,153,.3)}50%{box-shadow:0 0 20px rgba(52,211,153,.7)}}
.btn-f2l{background:linear-gradient(145deg,#1a0a3a,#0d0520);color:#c084fc;
  border:1px solid rgba(192,132,252,.4);font-size:.75rem;padding:13px}
.btn-f2l:disabled{opacity:.4;cursor:not-allowed;transform:none!important;filter:none!important}
.btn-f2l.solving{background:linear-gradient(145deg,#0d1a3a,#060e20);color:#a78bfa;
  border-color:rgba(167,139,250,.5);animation:f2lPulse 1s ease infinite}
@keyframes f2lPulse{0%,100%{box-shadow:0 0 8px rgba(192,132,252,.3)}50%{box-shadow:0 0 22px rgba(192,132,252,.75)}}
.btn-oll{background:linear-gradient(145deg,#1a2a0a,#0d1a05);color:#86efac;
  border:1px solid rgba(134,239,172,.4);font-size:.75rem;padding:13px}
.btn-oll:disabled{opacity:.4;cursor:not-allowed;transform:none!important;filter:none!important}
.btn-oll.solving{background:linear-gradient(145deg,#0a2a1a,#051a0d);color:#4ade80;
  border-color:rgba(74,222,128,.5);animation:ollPulse 1s ease infinite}
@keyframes ollPulse{0%,100%{box-shadow:0 0 8px rgba(134,239,172,.3)}50%{box-shadow:0 0 22px rgba(134,239,172,.75)}}
.solver-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.btn-label-pair{display:flex;flex-direction:column;align-items:center;gap:2px}
.btn-move{font-size:.82rem}
.btn-arrow{font-size:.6rem;opacity:.7}

.kbd-hint{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-align:center}
.kbd-hint kbd{background:rgba(255,255,255,.07);border:1px solid var(--border);
  border-radius:4px;padding:1px 5px;font-family:inherit}

.debug-panel{width:100%;max-width:780px;background:rgba(0,0,0,.55);border:1px solid #1e1e35;
  border-radius:12px;padding:12px 14px;display:none;flex-direction:column;gap:6px}
.debug-panel.visible{display:flex}
.debug-title{font-size:.58rem;letter-spacing:.18em;color:#4a4e72;text-transform:uppercase;
  display:flex;align-items:center;justify-content:space-between}
.debug-clear{font-size:.58rem;color:#4a4e72;background:none;border:none;cursor:pointer;
  font-family:inherit;letter-spacing:.1em;padding:0}
.debug-clear:hover{color:#8aabff}
.debug-lines{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:#1e1e35 transparent}
.debug-line{display:flex;align-items:flex-start;gap:8px;padding:5px 8px;border-radius:6px;
  background:rgba(255,255,255,.03);border:1px solid #1e1e35;font-size:.65rem;
  font-family:"JetBrains Mono",monospace;color:#c8cee8;word-break:break-all;line-height:1.5}
.debug-line.err{border-color:rgba(220,50,50,.3);background:rgba(220,50,50,.06);color:#ff9090}
.debug-line.dbg{border-color:rgba(79,111,255,.2);background:rgba(79,111,255,.04);color:#8aabff}
.debug-line-text{flex:1}
.debug-copy{flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid #1e1e35;
  border-radius:5px;cursor:pointer;font-size:.6rem;color:#4a4e72;padding:2px 7px;
  font-family:inherit;transition:background .15s,color .15s;white-space:nowrap}
.debug-copy:hover{background:rgba(79,111,255,.15);color:#8aabff;border-color:rgba(79,111,255,.3)}
.debug-copy.copied{color:#4ade80;border-color:rgba(74,222,128,.3)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);
  background:#1a1a30;border:1px solid var(--border);border-radius:12px;
  padding:10px 22px;font-size:.75rem;color:var(--text);
  transition:transform .3s ease,opacity .3s ease;opacity:0;z-index:200}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:700px){
  :root{--half:75px;--cell:46px;--gap:3px}
  .app{padding:12px 10px 28px;gap:14px}
  .header{flex-direction:column;align-items:center;text-align:center;gap:8px}
  .title-block h1{font-size:1.3rem}
  .status-bar{justify-content:center;flex-wrap:wrap;gap:6px}
  .live-dot,.online-count,.my-badge{font-size:.6rem;padding:4px 10px}
  .stage{flex-direction:column;align-items:center;gap:16px}
  .move-log-panel{display:none}
  .cube-viewport{width:210px;height:210px}
  .info-bar{padding:8px 14px;gap:12px}
  .info-value{font-size:1rem}
  .info-key{font-size:.52rem}
  .controls{gap:10px}
  .section-title{font-size:.55rem;margin-bottom:6px}
  .move-grid{grid-template-columns:repeat(6,1fr);gap:5px}
  .btn{padding:10px 2px;font-size:.6rem;border-radius:8px}
  .btn-move{font-size:.78rem}
  .btn-arrow{display:none}
  .action-row{gap:8px}
  .btn-reset,.btn-scramble,.btn-solve,.btn-f2l{padding:10px 4px;font-size:.62rem}
  .solver-row{gap:8px}
  .kbd-hint{display:none}
}
</style>
</head>
<body>
<div class="stars"></div>

<div class="overlay" id="overlay">
  <div class="overlay-icon">⧖</div>
  <div class="overlay-text">CONNECTING…</div>
  <div class="overlay-sub">Connecting to Firebase real-time database.</div>
</div>

<div class="app">
  <div class="header">
    <div class="title-block">
      <h1>RUBIK'S <span>CUBE</span></h1>
      <div class="subtitle">Live Multiplayer · Real-time Sync</div>
    </div>
    <div class="status-bar">
      <div class="live-dot"><div class="pulse-dot"></div>LIVE</div>
      <div class="online-count">👥 <span id="onlineCount">—</span>&nbsp;online</div>
      <div class="my-badge" id="myBadge">You: —</div>
    </div>
  </div>

  <div class="stage">
    <div class="cube-viewport" id="cubeVP">
      <div class="cube-scene" id="cubeScene">
        <div class="face face-F" id="face-F"></div>
        <div class="face face-B" id="face-B"></div>
        <div class="face face-R" id="face-R"></div>
        <div class="face face-L" id="face-L"></div>
        <div class="face face-U" id="face-U"></div>
        <div class="face face-D" id="face-D"></div>
      </div>
    </div>

    <div class="move-log-panel">
      <div class="move-log-title">Move History</div>
      <div class="move-log" id="moveLog"></div>
    </div>
  </div>

  <div class="info-bar">
    <div class="info-item">
      <div class="info-value" id="moveCount">0</div>
      <div class="info-key">Total Moves</div>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <div class="last-move" id="lastMove">—</div>
      <div class="info-key">Last Move</div>
    </div>
    <div class="info-sep"></div>
    <div class="solved-badge" id="solvedBadge">SOLVED ✓</div>
  </div>

  <div class="controls">
    <div style="width:100%">
      <div class="section-title">— Face Rotations —</div>
      <div class="move-grid">
        <button class="btn btn-U"  onclick="doMove('U')"><div class="btn-label-pair"><span class="btn-move">U</span><span class="btn-arrow">↻ CW</span></div></button>
        <button class="btn btn-Uc" onclick="doMove('U\'')"><div class="btn-label-pair"><span class="btn-move">U′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button id="btn-R"  class="btn btn-R"  onclick="doMove('R')"><div class="btn-label-pair"><span class="btn-move">R</span><span class="btn-arrow">↻ CW</span></div></button>
        <button id="btn-Rc" class="btn btn-Rc" onclick="doMove('R\'')"><div class="btn-label-pair"><span class="btn-move">R′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button id="btn-F"  class="btn btn-F"  onclick="doMove('F')"><div class="btn-label-pair"><span class="btn-move">F</span><span class="btn-arrow">↻ CW</span></div></button>
        <button id="btn-Fc" class="btn btn-Fc" onclick="doMove('F\'')"><div class="btn-label-pair"><span class="btn-move">F′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button class="btn btn-D"  onclick="doMove('D')"><div class="btn-label-pair"><span class="btn-move">D</span><span class="btn-arrow">↻ CW</span></div></button>
        <button class="btn btn-Dc" onclick="doMove('D\'')"><div class="btn-label-pair"><span class="btn-move">D′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button id="btn-L"  class="btn btn-L"  onclick="doMove('L')"><div class="btn-label-pair"><span class="btn-move">L</span><span class="btn-arrow">↻ CW</span></div></button>
        <button id="btn-Lc" class="btn btn-Lc" onclick="doMove('L\'')"><div class="btn-label-pair"><span class="btn-move">L′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button id="btn-B"  class="btn btn-B"  onclick="doMove('B')"><div class="btn-label-pair"><span class="btn-move">B</span><span class="btn-arrow">↻ CW</span></div></button>
        <button id="btn-Bc" class="btn btn-Bc" onclick="doMove('B\'')"><div class="btn-label-pair"><span class="btn-move">B′</span><span class="btn-arrow">↺ CCW</span></div></button>
      </div>
    </div>
    <div class="action-row" style="grid-template-columns:1fr 1fr">
      <button class="btn btn-reset"    onclick="resetCube()">⟳ RESET</button>
      <button class="btn btn-scramble" onclick="scrambleCube()">⚄ SCRAMBLE</button>
    </div>

    <div class="kbd-hint">
      <kbd>U</kbd><kbd>D</kbd><kbd>F</kbd><kbd>B</kbd><kbd>R</kbd><kbd>L</kbd>
      + <kbd>Shift</kbd> CCW &nbsp;·&nbsp; <kbd>Space</kbd> scramble &nbsp;·&nbsp; <kbd>Esc</kbd> reset
    </div>
    <div class="debug-panel" id="debugPanel">
      <div class="debug-title">
        <span>⬡ DEBUG LOG</span>
        <div style="display:flex;gap:8px">
          <button class="debug-clear" id="debugCopyAll" onclick="copyAllDebugLines()">COPY ALL</button>
          <button class="debug-clear" onclick="clearDebugLog()">CLEAR</button>
        </div>
      </div>
      <div class="debug-lines" id="debugLines"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
// ─── Firebase wait ───────────────────────────────────────────────────────────
function waitForFB(cb, n=0) {
  if (window._fb) return cb(window._fb);
  if (n > 50) return;
  setTimeout(() => waitForFB(cb, n+1), 100);
}

// ─── State ───────────────────────────────────────────────────────────────────
const COLORS = {W:'#f0f0f0',Y:'#ffd600',G:'#00b518',B:'#1565ff',O:'#ff7200',R:'#e00000'};
const FACES  = ['U','D','F','B','L','R'];
const SOLVED = {
  U:Array(9).fill('Y'), D:Array(9).fill('W'), F:Array(9).fill('G'),
  B:Array(9).fill('B'), L:Array(9).fill('R'), R:Array(9).fill('O')
};
let state = {};
function clone(s) { const c={}; for (const k in s) c[k]=[...s[k]]; return c; }

// ─── Move functions ──────────────────────────────────────────────────────────
function cw(f) { return [f[6],f[3],f[0],f[7],f[4],f[1],f[8],f[5],f[2]]; }

// B face stored in NATURAL order: 0=top-left-external, 2=top-right-external,
// 6=bottom-left-external, 8=bottom-right-external (matches Firebase / reading order).
// B_cw uses ccw() on the stored array because rotateY(180deg) mirrors the face,
// so a visual CW-from-behind = CCW in stored index space.

function ccw(f) { return [f[2],f[5],f[8],f[1],f[4],f[7],f[0],f[3],f[6]]; }

function U_cw(s) {
  s.U = cw(s.U);
  const [a,b,c] = [s.F[0],s.F[1],s.F[2]];
  [s.F[0],s.F[1],s.F[2]] = [s.R[0],s.R[1],s.R[2]];
  [s.R[0],s.R[1],s.R[2]] = [s.B[0],s.B[1],s.B[2]];
  [s.B[0],s.B[1],s.B[2]] = [s.L[0],s.L[1],s.L[2]];
  [s.L[0],s.L[1],s.L[2]] = [a,b,c];
  console.log('%c[U_cw] F-top→R-top→B-top→L-top cycle OK','color:#ffd600');
}
function D_cw(s) {
  s.D = cw(s.D);
  const [a,b,c] = [s.F[6],s.F[7],s.F[8]];
  [s.F[6],s.F[7],s.F[8]] = [s.L[6],s.L[7],s.L[8]];
  [s.L[6],s.L[7],s.L[8]] = [s.B[8],s.B[7],s.B[6]];
  [s.B[8],s.B[7],s.B[6]] = [s.R[6],s.R[7],s.R[8]];
  [s.R[6],s.R[7],s.R[8]] = [a,b,c];
  console.log('%c[D_cw] F-bot→L-bot→B-bot→R-bot cycle OK','color:#c0c0c0');
}
function F_cw(s) {
  s.F = cw(s.F);
  const [a,b,c] = [s.U[6],s.U[7],s.U[8]];
  [s.U[6],s.U[7],s.U[8]] = [s.L[8],s.L[5],s.L[2]];
  [s.L[8],s.L[5],s.L[2]] = [s.D[2],s.D[1],s.D[0]];
  [s.D[2],s.D[1],s.D[0]] = [s.R[0],s.R[3],s.R[6]];
  [s.R[0],s.R[3],s.R[6]] = [a,b,c];
  console.log('%c[F_cw] U-bot→L-right→D-top→R-left cycle OK','color:#00b518');
}
function B_cw(s) {
  // B face is CSS rotateY(180deg) mirrored → visual CW = stored CCW
  s.B = ccw(s.B);
  const [a,b,c] = [s.U[0],s.U[1],s.U[2]];
  [s.U[0],s.U[1],s.U[2]] = [s.R[2],s.R[5],s.R[8]];
  [s.R[2],s.R[5],s.R[8]] = [s.D[8],s.D[7],s.D[6]];
  [s.D[8],s.D[7],s.D[6]] = [s.L[6],s.L[3],s.L[0]];
  [s.L[6],s.L[3],s.L[0]] = [a,b,c];
  console.log('%c[B_cw] U-top:', 'color:#1565ff', s.U.slice(0,3), '| R-right:', [s.R[2],s.R[5],s.R[8]], '| D-bot:', s.D.slice(6), '| L-left:', [s.L[0],s.L[3],s.L[6]]);
}
function R_cw(s) {
  s.R = cw(s.R);
  // B is stored mirrored: external right col = stored LEFT col (indices 6,3,0)
  const [a,b,c] = [s.F[2],s.F[5],s.F[8]];
  [s.F[2],s.F[5],s.F[8]] = [s.D[2],s.D[5],s.D[8]];
  [s.D[2],s.D[5],s.D[8]] = [s.B[6],s.B[3],s.B[0]];
  [s.B[6],s.B[3],s.B[0]] = [s.U[2],s.U[5],s.U[8]];
  [s.U[2],s.U[5],s.U[8]] = [a,b,c];
  console.log('%c[R_cw] F-right:', 'color:#ff7200', [s.F[2],s.F[5],s.F[8]], '| D-right:', [s.D[2],s.D[5],s.D[8]], '| B-left(stored):', [s.B[6],s.B[3],s.B[0]], '| U-right:', [s.U[2],s.U[5],s.U[8]]);
}
function L_cw(s) {
  s.L = cw(s.L);
  // B is stored mirrored: external left col = stored RIGHT col (indices 2,5,8)
  const [a,b,c] = [s.F[0],s.F[3],s.F[6]];
  [s.F[0],s.F[3],s.F[6]] = [s.U[0],s.U[3],s.U[6]];
  [s.U[0],s.U[3],s.U[6]] = [s.B[8],s.B[5],s.B[2]];
  [s.B[8],s.B[5],s.B[2]] = [s.D[0],s.D[3],s.D[6]];
  [s.D[0],s.D[3],s.D[6]] = [a,b,c];
  console.log('%c[L_cw] F-left:', 'color:#e00000', [s.F[0],s.F[3],s.F[6]], '| U-left:', [s.U[0],s.U[3],s.U[6]], '| B-right(stored):', [s.B[8],s.B[5],s.B[2]], '| D-left:', [s.D[0],s.D[3],s.D[6]]);
}

const MOVES = {
  'U':  s => U_cw(s),
  "U'": s => { U_cw(s); U_cw(s); U_cw(s); },
  'U2': s => { U_cw(s); U_cw(s); },
  'D':  s => D_cw(s),
  "D'": s => { D_cw(s); D_cw(s); D_cw(s); },
  'D2': s => { D_cw(s); D_cw(s); },
  'F':  s => F_cw(s),
  "F'": s => { F_cw(s); F_cw(s); F_cw(s); },
  'F2': s => { F_cw(s); F_cw(s); },
  'B':  s => B_cw(s),
  "B'": s => { B_cw(s); B_cw(s); B_cw(s); },
  'B2': s => { B_cw(s); B_cw(s); },
  'R':  s => R_cw(s),
  "R'": s => { R_cw(s); R_cw(s); R_cw(s); },
  'R2': s => { R_cw(s); R_cw(s); },
  'L':  s => L_cw(s),
  "L'": s => { L_cw(s); L_cw(s); L_cw(s); },
  'L2': s => { L_cw(s); L_cw(s); },
};

function isSolved() { return FACES.every(f => state[f].every(c => c === state[f][0])); }

// ─── Startup self-test: every move×4 must be identity ────────────────────────
(function selfTest() {
  const base = {
    U:Array(9).fill('Y'), D:Array(9).fill('W'), F:Array(9).fill('G'),
    B:Array(9).fill('B'), L:Array(9).fill('R'), R:Array(9).fill('O')
  };
  const reps = { "U":4,"U'":4,"D":4,"D'":4,"F":4,"F'":4,"B":4,"B'":4,"R":4,"R'":4,"L":4,"L'":4 };
  let allOK = true;
  console.log('%c🎲 Rubik\'s cube move self-test', 'font-weight:bold;color:#4f6fff');
  for (const [mv, n] of Object.entries(reps)) {
    const s = clone(base);
    for (let i = 0; i < n; i++) MOVES[mv](s);
    const ok = FACES.every(f => s[f].join('') === base[f].join(''));
    if (!ok) allOK = false;
    console.log(`%c${mv}×${n} = identity: ${ok ? '✅' : '❌ BROKEN'}`, ok ? 'color:#4ade80' : 'color:#ff4444;font-weight:bold');
    if (!ok) for (const f of FACES) {
      if (s[f].join('') !== base[f].join(''))
        console.warn(`  face ${f}: got [${s[f].join('')}] expected [${base[f].join('')}]`);
    }
  }
  const commSeq = ['U','R',"U'","R'"];
  const cs = clone(base);
  for (let i = 0; i < 6; i++) for (const m of commSeq) MOVES[m](cs);
  const commOK = FACES.every(f => cs[f].join('') === base[f].join(''));
  console.log(`%c[U R U' R']×6 identity: ${commOK ? '✅' : '❌ BROKEN'}`, commOK ? 'color:#4ade80' : 'color:#ff4444;font-weight:bold');
  console.log(`%cOverall: ${allOK && commOK ? '✅ ALL MOVES CORRECT' : '❌ SOME MOVES BROKEN — check above'}`,
    allOK && commOK ? 'color:#4ade80;font-weight:bold;font-size:14px' : 'color:#ff4444;font-weight:bold;font-size:14px');

})();

// ─── Rendering ───────────────────────────────────────────────────────────────
//
// face-B has CSS rotateY(180deg) which mirrors LEFT↔RIGHT.
// Storage order matches visual external positions AFTER the mirror:
// index 0 = top-left in DOM (= top-RIGHT external), index 2 = top-right in DOM (= top-LEFT external).
// So stickers are inserted straight (DOM slot i = state[B][i]) and the CSS mirror
// naturally places each sticker at the correct external position.
// Firebase therefore stores B as [2,1,0,5,4,3,8,7,6] relative to external view.

function buildFace(faceName) {
  const el = document.getElementById(`face-${faceName}`);
  el.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const d = document.createElement('div');
    d.className = 'sticker';
    d.style.background = COLORS[state[faceName][i]];
    el.appendChild(d);
  }
}

function updateFace(faceName, prevColors) {
  const el = document.getElementById(`face-${faceName}`);
  const stickers = el.querySelectorAll('.sticker');
  for (let i = 0; i < 9; i++) {
    stickers[i].style.background = COLORS[state[faceName][i]];
    if (prevColors && state[faceName][i] !== prevColors[i]) {
      stickers[i].classList.remove('flash');
      void stickers[i].offsetWidth;
      stickers[i].classList.add('flash');
    }
  }
}

function renderAll(prevState) {
  for (const f of FACES) {
    const el = document.getElementById(`face-${f}`);
    if (!el.children.length) buildFace(f);
    else updateFace(f, prevState ? prevState[f] : null);
  }
  document.getElementById('solvedBadge').classList.toggle('show', isSolved());
  const wasSolved = document.getElementById('solvedBadge').classList.contains('show');
  const nowSolved = isSolved();
  document.getElementById('solvedBadge').classList.toggle('show', nowSolved);
  if (!wasSolved && nowSolved) playSolve();
}

// ─── UI helpers ──────────────────────────────────────────────────────────────
function addLog(move, avatar, isMe) {
  const log = document.getElementById('moveLog');
  const e = document.createElement('div');
  e.className = 'log-entry' + (isMe ? ' mine' : '');
  e.innerHTML = `<span class="log-avatar">${avatar}</span>`+
    `<span class="log-move">${move}</span>`+
    (isMe ? '<span class="log-you">you</span>' : '');
  log.prepend(e);
  while (log.children.length > 30) log.removeChild(log.lastChild);
}

function addDebugLine(text, type='dbg') {
  const panel = document.getElementById('debugPanel');
  const lines = document.getElementById('debugLines');
  panel.classList.add('visible');
  const row = document.createElement('div');
  row.className = 'debug-line ' + type;
  const span = document.createElement('span');
  span.className = 'debug-line-text';
  span.textContent = text;
  const btn = document.createElement('button');
  btn.className = 'debug-copy';
  btn.textContent = 'copy';
  btn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
    });
  };
  row.appendChild(span);
  row.appendChild(btn);
  lines.appendChild(row);
  lines.scrollTop = lines.scrollHeight;
}

window.clearDebugLog = function() {
  document.getElementById('debugLines').innerHTML = '';
  document.getElementById('debugPanel').classList.remove('visible');
};

window.copyAllDebugLines = function() {
  const lines = document.getElementById('debugLines');
  const text = Array.from(lines.querySelectorAll('.debug-line-text'))
    .map(el => el.textContent).join('\n');
  const btn = document.getElementById('debugCopyAll');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'COPIED!';
    setTimeout(() => { btn.textContent = 'COPY ALL'; }, 1800);
  });
};

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── Firebase ────────────────────────────────────────────────────────────────
waitForFB(fb => {
  const {db,ref,set,onValue,cubeRef,moveCountRef,presenceAll,recentRef,myId,myAvatar} = fb;

  document.getElementById('myBadge').textContent = `You: ${myAvatar}`;
  document.getElementById('overlay').classList.add('hidden');
  console.log(`%c[Firebase] Connected ✅  id=${myId} avatar=${myAvatar}`, 'color:#00e528;font-weight:bold');

  onValue(presenceAll, snap => {
    document.getElementById('onlineCount').textContent =
      snap.exists() ? Object.keys(snap.val()).length : 0;
  });

  let firstLoad = true;
  onValue(cubeRef, snap => {
    if (!snap.exists()) {
      state = clone(SOLVED);
      set(cubeRef, state);
      renderAll(null);
      firstLoad = false;
      return;
    }
    // During solver playback, ignore Firebase echoes — we own the state
    if (window._solverRunning && !firstLoad) return;
    const remote = snap.val();
    const prev = firstLoad ? null : clone(state);
    for (const f of FACES) {
      state[f] = remote[f]
        ? (Array.isArray(remote[f]) ? remote[f] : Object.values(remote[f]))
        : [...SOLVED[f]];
    }
    renderAll(prev);
    firstLoad = false;
  });

  onValue(moveCountRef, snap => {
    document.getElementById('moveCount').textContent = snap.exists() ? snap.val() : 0;
  });

  let knownKeys = new Set(), logReady = false;
  onValue(recentRef, snap => {
    if (!snap.exists()) return;
    const entries = snap.val();
    if (!logReady) {
      Object.entries(entries).sort((a,b)=>a[1].t-b[1].t).slice(-10).reverse()
        .forEach(([k,e])=>{ knownKeys.add(k); addLog(e.m,e.av,e.id===myId); });
      logReady = true;
    } else {
      Object.entries(entries).filter(([k])=>!knownKeys.has(k))
        .sort((a,b)=>a[1].t-b[1].t)
        .forEach(([k,e])=>{ knownKeys.add(k); if(e.id!==myId) addLog(e.m,e.av,false); });
    }
  });

  // ─── Audio ───────────────────────────────────────────────────────────────────
  const AC = new (window.AudioContext || window.webkitAudioContext)();

  function playClick() {
    const buf = AC.createBuffer(1, AC.sampleRate * 0.06, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++)
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (AC.sampleRate * 0.008));
    const src = AC.createBufferSource();
    const filt = AC.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 1800; filt.Q.value = 1.2;
    const gain = AC.createGain();
    gain.gain.setValueAtTime(0.35, AC.currentTime);
    src.buffer = buf;
    src.connect(filt); filt.connect(gain); gain.connect(AC.destination);
    src.start();
  }

  function playWhoosh() {
    const dur = 0.45;
    const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++)
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    const src = AC.createBufferSource();
    const filt = AC.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 600;
    filt.frequency.linearRampToValueAtTime(200, AC.currentTime + dur);
    const gain = AC.createGain();
    gain.gain.setValueAtTime(0.5, AC.currentTime);
    gain.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
    src.buffer = buf;
    src.connect(filt); filt.connect(gain); gain.connect(AC.destination);
    src.start();
  }

  function playSolve() {
    const notes = [261.63, 329.63, 392.00, 523.25]; // C E G C — major chord
    notes.forEach((freq, i) => {
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = AC.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
      osc.connect(gain); gain.connect(AC.destination);
      osc.start(t); osc.stop(t + 1.2);
    });
  }

  // ─── Spam protection ───────────────────────────────────────────────────────
  const MOVE_LIMIT = 5;            // max moves per window
  const MOVE_WINDOW_MS = 1000;     // rolling window in ms
  const SCRAMBLE_COOLDOWN_MS = 5000;
  let moveTimes = [];
  let lastScrambleTime = 0;
  let moveBlocked = false;

  function checkMoveRate() {
    const now = Date.now();
    moveTimes = moveTimes.filter(t => now - t < MOVE_WINDOW_MS);
    if (moveTimes.length >= MOVE_LIMIT) {
      if (!moveBlocked) {
        moveBlocked = true;
        showToast('Slow down! Too many moves at once.');
        setTimeout(() => { moveBlocked = false; }, MOVE_WINDOW_MS);
      }
      return false;
    }
    moveTimes.push(now);
    return true;
  }

  // ─── View-relative move remapping ────────────────────────────────────────────
  // Determines which world face is currently "front" based on ry, then remaps
  // button labels (F/B/L/R) to the correct world face before executing.
  const VIEW_MAPS = [
    { front:'F', map:{F:'F',R:'R',B:'B',L:'L',U:'U',D:'D'} }, // ry ≈ 0°
    { front:'L', map:{F:'L',R:'F',B:'R',L:'B',U:'U',D:'D'} }, // ry ≈ 90°
    { front:'B', map:{F:'B',R:'L',B:'F',L:'R',U:'U',D:'D'} }, // ry ≈ 180°
    { front:'R', map:{F:'R',R:'B',B:'L',L:'F',U:'U',D:'D'} }, // ry ≈ 270°
  ];

  function remapMove(moveName) {
    const ry = (((window._cubeRY || 0) % 360) + 360) % 360;
    const sector = Math.round(ry / 90) % 4; // 0=F,1=L,2=B,3=R
    const { map } = VIEW_MAPS[sector];
    return moveName.replace(/^[FBLR]/, f => map[f] || f);
  }

  // Button label → [cwClass, ccwClass]
  const BTN_COLOR_CLASSES = {
    F: ['btn-F',  'btn-Fc'],
    B: ['btn-B',  'btn-Bc'],
    R: ['btn-R',  'btn-Rc'],
    L: ['btn-L',  'btn-Lc'],
  };
  const ALL_COLOR_CLASSES = Object.values(BTN_COLOR_CLASSES).flat();

  function updateButtonColors(ry) {
    const sector = Math.round((((ry % 360) + 360) % 360) / 90) % 4;
    const { map } = VIEW_MAPS[sector];
    for (const label of ['F','B','R','L']) {
      const worldFace = map[label];
      const [cwClass, ccwClass] = BTN_COLOR_CLASSES[worldFace];
      const cwBtn  = document.getElementById(`btn-${label}`);
      const ccwBtn = document.getElementById(`btn-${label}c`);
      if (!cwBtn) continue;
      cwBtn.classList.remove(...ALL_COLOR_CLASSES);
      cwBtn.classList.add(cwClass);
      ccwBtn.classList.remove(...ALL_COLOR_CLASSES);
      ccwBtn.classList.add(ccwClass);
    }
  }
  window._updateButtonColors = updateButtonColors;
  updateButtonColors(window._cubeRY || 40); // init on load

  if (window._solverRunning) { showToast('Solver already running…'); return; }
  const btn = document.getElementById('f2lBtn');

  function crossDone(s){ return s.D[1]==='W'&&s.F[7]==='G'&&s.D[3]==='W'&&s.L[7]==='R'&&s.D[5]==='W'&&s.R[7]==='O'&&s.D[7]==='W'&&s.B[7]==='B'; }
  function f2lDone(s){
    return crossDone(s)&&s.D[2]==='W'&&s.F[8]==='G'&&s.R[6]==='O'&&s.D[0]==='W'&&s.F[6]==='G'&&s.L[8]==='R'&&
      s.D[8]==='W'&&s.B[6]==='B'&&s.R[8]==='O'&&s.D[6]==='W'&&s.B[8]==='B'&&s.L[6]==='R'&&
      s.F[5]==='G'&&s.R[3]==='O'&&s.F[3]==='G'&&s.L[5]==='R'&&s.B[3]==='B'&&s.R[5]==='O'&&s.B[5]==='B'&&s.L[3]==='R';
  }

  // ── Debug snapshot ──
  addDebugLine(`[F2L start] crossDone=${crossDone(state)} f2lDone=${f2lDone(state)}`, 'dbg');
  addDebugLine(`[F2L] U:${state.U.join('')} D:${state.D.join('')}`, 'dbg');
  addDebugLine(`[F2L] F:${state.F.join('')} B:${state.B.join('')} R:${state.R.join('')} L:${state.L.join('')}`, 'dbg');
  { const s4={...state,U:[...state.U],D:[...state.D],F:[...state.F],B:[...state.B],R:[...state.R],L:[...state.L]};
    MOVES['R'](s4);MOVES['R'](s4);MOVES['R'](s4);MOVES['R'](s4);
    const rId=FACES.every(f=>s4[f].join('')===state[f].join(''));
    const s4L={...state,U:[...state.U],D:[...state.D],F:[...state.F],B:[...state.B],R:[...state.R],L:[...state.L]};
    MOVES['L'](s4L);MOVES['L'](s4L);MOVES['L'](s4L);MOVES['L'](s4L);
    const lId=FACES.every(f=>s4L[f].join('')===state[f].join(''));
    addDebugLine(`[F2L] R×4=identity:${rId} L×4=identity:${lId} (both must be true)`,rId&&lId?'dbg':'err');
  }

  if (f2lDone(state)) { showToast('First two layers already solved!'); return; }

  btn.disabled = true;
  btn.classList.add('solving');

  const PLAYBACK_MS = 350;
  const calcStart = Date.now();
  let calcTimer = null;
  function startCalcTimer(label) {
    clearInterval(calcTimer);
    calcTimer = setInterval(() => {
      btn.textContent = `⏳ ${label} (${((Date.now()-calcStart)/1000).toFixed(1)}s)…`;
    }, 100);
  }
  function stopCalcTimer() { clearInterval(calcTimer); calcTimer = null; }

  startCalcTimer('Calculating cross');
  showToast('Calculating first two layers… (~5–20s)');

  const snap = clone(state);
  const stateKey = s => FACES.map(f => s[f].join('')).join('');

  // Step 1: cross worker
  let crossMoves = [];
  if (!crossDone(snap)) {
    if (wcross) { wcross.terminate(); wcross = null; }
    wcross = new Worker(URL.createObjectURL(new Blob([W], {type:'application/javascript'})));
    crossMoves = await new Promise((res, rej) => {
      wcross.onmessage = e => {
        if (e.data.progress) { addDebugLine('[cross] '+e.data.progress,'dbg'); return; }
        wcross.terminate(); wcross = null;
        if(e.data.error){ addDebugLine('CROSS ERROR: '+e.data.error,'err'); rej(new Error(e.data.error)); }
        else { addDebugLine('Cross: '+e.data.solution.length+' moves','dbg'); res(e.data.solution); }
      };
      wcross.onerror = err => { wcross.terminate(); wcross = null; rej(err); };
      wcross.postMessage(snap);
    }).catch(err => {
      stopCalcTimer();
      showToast(err.message||'Could not solve cross.');
      btn.disabled=false; btn.classList.remove('solving'); btn.textContent='⬛ SOLVE FIRST 2 LAYERS';
      return null;
    });
    if (crossMoves === null) return;
  }

  const afterCross = clone(snap);
  for (const m of crossMoves) MOVES[m](afterCross);

  // Step 2: F2L worker solves cross+F2L together from original scrambled state
  // (combined IDA* avoids the cross-constraint problem that makes per-pair solving slow)
  startCalcTimer('Calculating F2L');
  let f2lMoves = [];
  if (!f2lDone(snap)) {
    if (wf2l) { wf2l.terminate(); wf2l = null; }
    wf2l = new Worker(URL.createObjectURL(new Blob([WF], {type:'application/javascript'})));
    const allF2LMoves = await new Promise((res, rej) => {
      wf2l.onmessage = e => {
        if(e.data.debug){ addDebugLine(e.data.debug,'dbg'); console.log('%c[F2L] '+e.data.debug,'color:#a78bfa'); return; }
        wf2l.terminate(); wf2l = null;
        if(e.data.error){ addDebugLine('F2L ERROR: '+e.data.error,'err'); rej(new Error(e.data.error)); }
        else res(e.data.solution);
      };
      wf2l.onerror = err => { wf2l.terminate(); wf2l = null; rej(err); };
      wf2l.postMessage(snap); // send original scrambled state, not post-cross
    }).catch(err => {
      stopCalcTimer();
      showToast(err.message||'Could not solve F2L.');
      btn.disabled=false; btn.classList.remove('solving'); btn.textContent='⬛ SOLVE FIRST 2 LAYERS';
      return null;
    });
    if (allF2LMoves === null) return;
    // WF now returns the complete cross+F2L sequence; crossMoves is subsumed
    crossMoves = [];
    f2lMoves = allF2LMoves;
  } else {
    f2lMoves = [];
  }

  stopCalcTimer();
  const calcTook = ((Date.now() - calcStart) / 1000).toFixed(1);

  const allMoves = [...crossMoves, ...f2lMoves];
  const finalSim = clone(snap);
  for (const m of allMoves) MOVES[m](finalSim);
  if (!f2lDone(finalSim)) {
    showToast('Solver error — try again!');
    btn.disabled=false; btn.classList.remove('solving'); btn.textContent='⬛ SOLVE FIRST 2 LAYERS';
    return;
  }
  if (stateKey(state) !== stateKey(snap)) {
    showToast('Cube changed while solving — try again!');
    btn.disabled=false; btn.classList.remove('solving'); btn.textContent='⬛ SOLVE FIRST 2 LAYERS';
    return;
  }
  if (!allMoves.length) {
    showToast('First two layers already solved!');
    btn.disabled=false; btn.classList.remove('solving'); btn.textContent='⬛ SOLVE FIRST 2 LAYERS';
    return;
  }

  // ── Step 4: play back all moves ──
  const playbackSec = Math.ceil(allMoves.length * PLAYBACK_MS / 1000);
  showToast(`Found in ${calcTook}s · ${allMoves.length} moves · ~${playbackSec}s to play`);
  window._solverRunning = true;
  try {
    for (let i = 0; i < allMoves.length; i++) {
      const movesLeft = allMoves.length - i - 1;
      const secsLeft  = Math.ceil(movesLeft * PLAYBACK_MS / 1000);
      btn.textContent = movesLeft > 0 ? `▶ ${movesLeft} moves · ~${secsLeft}s` : '⬛ SOLVE FIRST 2 LAYERS';
      await new Promise(r => setTimeout(r, PLAYBACK_MS));
      window.doMoveLocal(allMoves[i]);
    }
    for (const f of FACES) state[f] = finalSim[f];
    renderAll(null);
    const {set:fbSet, cubeRef:fbCR, moveCountRef:fbMC} = window._fb;
    await fbSet(fbCR, clone(state));
    const n = (parseInt(document.getElementById('moveCount').textContent) || 0) + allMoves.length;
    await fbSet(fbMC, n);
  } finally {
    window._solverRunning = false;
    btn.disabled = false;
    btn.classList.remove('solving'); btn.textContent = '⬛ SOLVE FIRST 2 LAYERS';
  }
};
})();


// ─── OLL Solver ───────────────────────────────────────────────────────────────
// Identifies the OLL case by fingerprinting the top layer's yellow sticker
// pattern, then plays the correct algorithm from a hardcoded lookup table.
// All 57 OLL cases + skip are covered.
//
// Fingerprint: 21 chars
//   [0-8]  U face stickers (1=yellow, 0=other), row-major
//   [9-11] F top row, [12-14] R top row, [15-17] B top row, [18-20] L top row
(function(){

function f2lDone(s){
  return s.D[1]==='W'&&s.F[7]==='G'&&s.D[3]==='W'&&s.L[7]==='R'&&s.D[5]==='W'&&s.R[7]==='O'&&s.D[7]==='W'&&s.B[7]==='B'&&
    s.D[2]==='W'&&s.F[8]==='G'&&s.R[6]==='O'&&s.D[0]==='W'&&s.F[6]==='G'&&s.L[8]==='R'&&
    s.D[8]==='W'&&s.B[6]==='B'&&s.R[8]==='O'&&s.D[6]==='W'&&s.B[8]==='B'&&s.L[6]==='R'&&
    s.F[5]==='G'&&s.R[3]==='O'&&s.F[3]==='G'&&s.L[5]==='R'&&s.B[3]==='B'&&s.R[5]==='O'&&s.B[5]==='B'&&s.L[3]==='R';
}
function ollDone(s){ return s.U.every(c=>c==='Y'); }

function parseAlg(alg){
  // Wide moves (r,l,f,b) expand to the face move + inner slice.
  // Since we have no inner-slice moves, we approximate: the face + its opposite' cancels center,
  // so r = R M' ≈ R (for top-layer orientation) and similarly for others.
  // For OLL correctness we use the "face only" approximation which works for all standard OLL algs.
  const expand={
    "r" :["R"],"r'" :["R'"],"r2" :["R2"],"r2'":["R2"],
    "l" :["L"],"l'" :["L'"],"l2" :["L2"],"l2'":["L2"],
    "f" :["F"],"f'" :["F'"],"f2" :["F2"],
    "b" :["B"],"b'" :["B'"],"b2" :["B2"],
    "M" :["R'","L"],"M'" :["R","L'"],"M2":["R2","L2"],
    "S" :["F","B'"],"S'" :["F'","B"],"S2":["F2","B2"],
    "x":[],"x'":[],"x2":[],"y":[],"y'":[],"y2":[],"z":[],"z'":[],"z2":[]
  };
  const out=[];
  for(const t of alg.trim().split(/\s+/)){
    if(expand[t]) for(const m of expand[t]) out.push(m);
    else if(MOVES[t]) out.push(t);
  }
  return out;
}

function reverseAlg(alg){
  return alg.trim().split(/\s+/).reverse().map(m=>{
    if(m.endsWith("2"))return m;
    if(m.endsWith("'"))return m.slice(0,-1);
    return m+"'";
  }).join(' ');
}

function fingerprint(s){
  let fp='';
  for(let i=0;i<9;i++) fp+=s.U[i]==='Y'?'1':'0';
  for(const i of [0,1,2]) fp+=s.F[i]==='Y'?'1':'0';
  for(const i of [0,1,2]) fp+=s.R[i]==='Y'?'1':'0';
  for(const i of [2,1,0]) fp+=s.B[i]==='Y'?'1':'0';
  for(const i of [0,1,2]) fp+=s.L[i]==='Y'?'1':'0';
  return fp;
}

const CASES=[
  [1, "R U2 R' U' R U R' U' R U' R'"],
  [2, "F R U R' U' F' f R U R' U' f'"],
  [3, "f R U R' U' f' U' F R U R' U' F'"],
  [4, "f R U R' U' f' U F R U R' U' F'"],
  [5, "r' U2 R U R' U r"],
  [6, "r U2 R' U' R U' r'"],
  [7, "r U R' U R U2 r'"],
  [8, "l' U' L U' L' U2 l"],
  [9, "R U R' U' R' F R2 U R' U' F'"],
  [10,"R U R' U R' F R F' R U2 R'"],
  [11,"r U R' U R' F R F' R U2 r'"],
  [12,"M' R' U' R U' R' U2 R U' M"],
  [13,"F U R U' R2 F' R U R U' R'"],
  [14,"R' F R U R' F' R F U' F'"],
  [15,"l' U' l L' U' L U l' U l"],
  [16,"r U r' R U R' U' r U' r'"],
  [17,"R U R' U R' F R F' U2 R' F R F'"],
  [18,"r U R' U R U2 r2' U' R U' R' U2 r"],
  [19,"R' U2 F R U R' U' F2 U2 F R"],
  [20,"M U R U R' U' M' R' F R F'"],
  [21,"R U2 R' U' R U R' U' R U' R'"],
  [22,"R U2 R2 U' R2 U' R2 U2 R"],
  [23,"R2 D' R U2 R' D R U2 R"],
  [24,"r U R' U' r' F R F'"],
  [25,"F' r U R' U' r' F R"],
  [26,"R U2 R' U' R U' R'"],
  [27,"R U R' U R U2 R'"],
  [28,"r U R' U' M U R U' R'"],
  [29,"R U R' U' R U' R' F' U' F R U R'"],
  [30,"F R' F R2 U' R' U' R U R' F2"],
  [31,"R' U' F U R U' R' F' R"],
  [32,"L U F' U' L' U L F L'"],
  [33,"R U R' U' R' F R F'"],
  [34,"R U R' U' B' R' F R F' B"],
  [35,"R U2 R2 F R F' R U2 R'"],
  [36,"R' U' R U' R' U R U l U' R' U"],
  [37,"F R U' R' U' R U R' F'"],
  [38,"R U R' U R U' R' U' R' F R F'"],
  [39,"L F' L' U' L U F U' L'"],
  [40,"R' F R U R' U' F' U R"],
  [41,"R U R' U R U2 R' F R U R' U' F'"],
  [42,"R' U' R U' R' U2 R F R U R' U' F'"],
  [43,"R' U' F' U F R"],
  [44,"f R U R' U' f'"],
  [45,"F R U R' U' F'"],
  [46,"R' U' R' F R F' U R"],
  [47,"R' U' R' F R F' R' F R F' U R"],
  [48,"F R U R' U' R U R' U' F'"],
  [49,"r U' r2' U r2 U r2' U' r"],
  [50,"r' U r2 U' r2' U' r2 U r'"],
  [51,"f R U R' U' R U R' U' f'"],
  [52,"R U R' U R U' B U' B' R'"],
  [53,"l' U2 L U L' U' L U L' U l"],
  [54,"r U2 R' U' R U R' U' R U' r'"],
  [55,"R' F R U R U' R2 F' R2 U' R' U R U R'"],
  [56,"r' U' r U' R' U R U' R' U R r' U r"],
  [57,"R U R' U' M' U R U' r'"],
];

function buildTable(){
  const tbl=new Map();
  function baseState(){
    return{
      U:['Y','Y','Y','Y','Y','Y','Y','Y','Y'],
      D:['W','W','W','W','W','W','W','W','W'],
      F:['G','G','G','G','G','G','G','G','G'],
      R:['O','O','O','O','O','O','O','O','O'],
      B:['B','B','B','B','B','B','B','B','B'],
      L:['R','R','R','R','R','R','R','R','R'],
    };
  }
  function applyList(s,moves){
    const ns={U:s.U.slice(),D:s.D.slice(),F:s.F.slice(),R:s.R.slice(),B:s.B.slice(),L:s.L.slice()};
    for(const m of moves) if(MOVES[m]) MOVES[m](ns);
    return ns;
  }
  const aufMoves=[[], ['U'], ['U','U'], ["U'"]];
  const aufLabels=['',  'U', 'U2', "U'"];
  const aufInvs  =['',  "U'", 'U2', 'U'];
  for(const [caseNum,alg] of CASES){
    const revMoves=parseAlg(reverseAlg(alg));
    const before=applyList(baseState(),revMoves);
    for(let u=0;u<4;u++){
      const rotated=applyList(before,aufMoves[u]);
      const fp=fingerprint(rotated);
      if(!tbl.has(fp)) tbl.set(fp,{caseNum,alg,aufPre:aufInvs[u]});
    }
  }
  return tbl;
}

window.solveOLL=async function(){
  if(window._solverRunning){showToast('Solver already running\u2026');return;}
  if(!f2lDone(state)){showToast('Solve the first two layers first!');return;}
  if(ollDone(state)){showToast('OLL already solved!');return;}

  const btn=document.getElementById('ollBtn');
  const f2lBtn=document.getElementById('f2lBtn');
  btn.disabled=true; f2lBtn.disabled=true;
  btn.classList.add('solving'); btn.textContent='\u29d0 Finding OLL\u2026';

  const table=buildTable();
  const fp=fingerprint(state);
  const entry=table.get(fp);
  addDebugLine(`[OLL] fingerprint=${fp} tableSize=${table.size} found=${!!entry}`, entry?'dbg':'err');
  if(entry) addDebugLine(`[OLL] case#${entry.caseNum} aufPre="${entry.aufPre}" alg="${entry.alg}"`, 'dbg');

  if(!entry){
    // Show what fingerprints ARE in the table vs what we have
    addDebugLine(`[OLL] U face: ${state.U.map(c=>c==='Y'?'Y':'.').join('')}`, 'err');
    addDebugLine(`[OLL] F-top:${state.F.slice(0,3).join('')} R-top:${state.R.slice(0,3).join('')} B-top:${state.B.slice(0,3).join('')} L-top:${state.L.slice(0,3).join('')}`, 'err');
    showToast('OLL case not recognised \u2014 see debug panel');
    btn.disabled=false; f2lBtn.disabled=false;
    btn.classList.remove('solving'); btn.textContent='\u25c8 SOLVE OLL';
    return;
  }

  const preMoves=entry.aufPre?parseAlg(entry.aufPre):[];
  const algMoves=parseAlg(entry.alg);
  const allMoves=[...preMoves,...algMoves];

  const snap=clone(state);
  const finalSim=clone(snap);
  for(const m of allMoves) MOVES[m](finalSim);
  if(!ollDone(finalSim)){
    addDebugLine(`[OLL] verification failed! allMoves=${allMoves.join(' ')}`, 'err');
    addDebugLine(`[OLL] finalSim U:${finalSim.U.join('')}`, 'err');
    showToast('OLL solver error \u2014 see debug panel');
    btn.disabled=false; f2lBtn.disabled=false;
    btn.classList.remove('solving'); btn.textContent='\u25c8 SOLVE OLL';
    return;
  }

  showToast('OLL #'+entry.caseNum+' \u2014 '+allMoves.length+' moves');
  btn.textContent='\u25b6 '+allMoves.length+' moves\u2026';
  window._solverRunning=true;
  try{
    for(let i=0;i<allMoves.length;i++){
      await new Promise(r=>setTimeout(r,350));
      window.doMoveLocal(allMoves[i]);
      btn.textContent=i<allMoves.length-1?'\u25b6 '+(allMoves.length-i-1)+' left\u2026':'\u25c8 SOLVE OLL';
    }
    for(const f of FACES) state[f]=finalSim[f];
    renderAll(null);
    const {set:fbSet,cubeRef:fbCR,moveCountRef:fbMC}=window._fb;
    await fbSet(fbCR,clone(state));
    const n=(parseInt(document.getElementById('moveCount').textContent)||0)+allMoves.length;
    await fbSet(fbMC,n);
  }finally{
    window._solverRunning=false;
    btn.disabled=false; f2lBtn.disabled=false;
    btn.classList.remove('solving'); btn.textContent='\u25c8 SOLVE OLL';
  }
};

})();

</script>

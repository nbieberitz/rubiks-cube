<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubik's Cube — Live Multiplayer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, serverTimestamp, onDisconnect }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCtcmV8TJzXlDywfMX6hSFnlaTM5QrLdsU",
    authDomain:        "rubik-s-cube-c7d48.firebaseapp.com",
    databaseURL:       "https://rubik-s-cube-c7d48-default-rtdb.firebaseio.com",
    projectId:         "rubik-s-cube-c7d48",
    storageBucket:     "rubik-s-cube-c7d48.firebasestorage.app",
    messagingSenderId: "710255457068",
    appId:             "1:710255457068:web:dca388111672110e7c7289"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const AVATARS = ['🟥','🟦','🟩','🟨','🟧','🟪','⬛','🤍'];
  let myId = sessionStorage.getItem('rubik_id') || Math.random().toString(36).slice(2,9);
  sessionStorage.setItem('rubik_id', myId);

  const cubeRef     = ref(db, 'cube/state');
  const moveCountRef= ref(db, 'cube/moveCount');
  const presenceRef = ref(db, `cube/presence/${myId}`);
  const presenceAll = ref(db, 'cube/presence');
  const recentRef   = ref(db, 'cube/recentMoves');

  let myAvatar = '⬜';
  const snap0 = await new Promise(r => onValue(presenceAll, r, {onlyOnce:true}));
  const taken = new Set(snap0.exists() ? Object.values(snap0.val()).map(u=>u.avatar) : []);
  const free  = AVATARS.filter(a=>!taken.has(a));
  myAvatar = free.length ? free[Math.floor(Math.random()*free.length)]
                         : AVATARS[Math.floor(Math.random()*AVATARS.length)];

  set(presenceRef, {avatar:myAvatar, t:serverTimestamp()});
  onDisconnect(presenceRef).remove();

  window._fb = {db,ref,set,onValue,cubeRef,moveCountRef,presenceAll,recentRef,myId,myAvatar};
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07070f; --panel:#0e0e1c; --border:#1e1e35;
  --glow:#4f6fff; --gold:#d4af37; --text:#c8cee8; --muted:#4a4e72;
  --half:105px; --cell:64px; --gap:4px;
}

html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono',monospace;overflow-x:hidden}

.stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 15%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 45%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 42% 38%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 60%,rgba(255,255,255,.5) 0%,transparent 100%)}

.app{position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:24px 20px 40px;gap:24px}

.header{width:100%;max-width:900px;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:12px}
.title-block h1{font-family:'Orbitron',sans-serif;
  font-size:clamp(1.2rem,3.5vw,2rem);font-weight:900;letter-spacing:.14em;
  color:#fff;text-shadow:0 0 30px rgba(79,111,255,.8)}
.title-block h1 span{color:var(--gold)}
.subtitle{font-size:.65rem;letter-spacing:.2em;color:var(--muted);margin-top:4px}
.status-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live-dot{display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:rgba(0,181,24,.08);border:1px solid rgba(0,181,24,.3);
  border-radius:20px;font-size:.65rem;color:#00e528}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:#00e528;
  animation:pulseDot 1.4s ease infinite}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(0,229,40,.5)}50%{box-shadow:0 0 0 5px rgba(0,229,40,0)}}
.online-count{display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:rgba(79,111,255,.08);border:1px solid rgba(79,111,255,.3);
  border-radius:20px;font-size:.65rem;color:#8aabff}
.my-badge{padding:5px 12px;background:rgba(212,175,55,.08);
  border:1px solid rgba(212,175,55,.3);border-radius:20px;font-size:.7rem;color:var(--gold)}

.overlay{position:fixed;inset:0;z-index:100;background:rgba(7,7,15,.92);
  backdrop-filter:blur(8px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;transition:opacity .4s}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay-icon{font-size:3rem;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-text{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--glow);letter-spacing:.15em}
.overlay-sub{font-size:.7rem;color:var(--muted);max-width:320px;text-align:center;line-height:1.7}

.stage{display:flex;gap:40px;align-items:center;flex-wrap:wrap;justify-content:center}

/* ── 3D CUBE ──────────────────────────────────────────────────────────────── */
.cube-viewport{width:300px;height:300px;perspective:800px;
  display:flex;align-items:center;justify-content:center;cursor:grab}
.cube-viewport.dragging{cursor:grabbing}

.cube-scene{
  width:calc(var(--half)*2);
  height:calc(var(--half)*2);
  transform-style:preserve-3d;
  transform:rotateX(-26deg) rotateY(40deg);
  transition:transform .08s ease;
}

/* face-B has an inner .face-grid child with scaleX(-1) to cancel rotateY(180deg) mirror. */
.face{
  position:absolute;
  width:calc(var(--half)*2);
  height:calc(var(--half)*2);
  display:grid;
  grid-template-columns:repeat(3,var(--cell));
  grid-template-rows:repeat(3,var(--cell));
  gap:var(--gap);
  padding:var(--gap);
  background:#111;
  border:2px solid rgba(255,255,255,.08);
  backface-visibility:visible;
  -webkit-backface-visibility:visible;
}
.face-F{transform:translateZ(var(--half))}
.face-B{transform:rotateY(180deg) translateZ(var(--half)) scaleX(-1) scaleY(-1);}
.face-R{transform:rotateY( 90deg) translateZ(var(--half))}
.face-L{transform:rotateY(-90deg) translateZ(var(--half))}
.face-U{transform:rotateX( 90deg) translateZ(var(--half))}
.face-D{transform:rotateX(-90deg) translateZ(var(--half))}

.sticker{border-radius:7px;transition:background-color .18s ease;
  box-shadow:inset 0 3px 6px rgba(255,255,255,.25),inset 0 -3px 6px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.5)}
.sticker.flash{animation:sFlash .25s ease}
@keyframes sFlash{0%{transform:scale(1);filter:brightness(1)}50%{transform:scale(.88);filter:brightness(1.6)}100%{transform:scale(1);filter:brightness(1)}}

.move-log-panel{display:flex;flex-direction:column;gap:8px;min-width:180px;max-width:200px}
.move-log-title{font-size:.6rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;text-align:center}
.move-log{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.log-entry{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:8px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:.7rem;animation:sIn .2s ease}
@keyframes sIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.log-avatar{font-size:.85rem}
.log-move{font-family:'Orbitron',sans-serif;font-weight:700;color:#fff;font-size:.75rem;min-width:24px}
.log-you{font-size:.55rem;color:var(--gold);margin-left:auto}
.log-entry.mine{background:rgba(79,111,255,.06);border-color:rgba(79,111,255,.2)}

.info-bar{display:flex;gap:20px;align-items:center;background:var(--panel);
  border:1px solid var(--border);border-radius:12px;padding:10px 22px}
.info-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.info-value{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700;color:#fff}
.info-key{font-size:.58rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.info-sep{width:1px;height:32px;background:var(--border)}
.last-move{font-family:'Orbitron',sans-serif;font-size:.95rem;color:var(--glow);
  min-width:44px;text-align:center;text-shadow:0 0 12px rgba(79,111,255,.6)}
.last-move.fade{animation:fMove .5s ease}
@keyframes fMove{0%{transform:translateY(-6px);opacity:0}30%{opacity:1}100%{transform:none;opacity:1}}
.solved-badge{font-family:'Orbitron',sans-serif;font-size:.68rem;letter-spacing:.1em;
  padding:5px 14px;border-radius:20px;background:rgba(0,181,24,.12);
  border:1px solid rgba(0,181,24,.4);color:#00e528;display:none}
.solved-badge.show{display:block;animation:pGreen 1.5s ease infinite}
@keyframes pGreen{0%,100%{box-shadow:0 0 6px rgba(0,229,40,.3)}50%{box-shadow:0 0 18px rgba(0,229,40,.7)}}

.controls{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:780px}
.section-title{font-size:.58rem;letter-spacing:.2em;color:var(--muted);
  text-transform:uppercase;text-align:center;margin-bottom:8px}
.move-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;width:100%}

.btn{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.04em;
  border:none;border-radius:10px;cursor:pointer;padding:12px 6px;position:relative;overflow:hidden;
  transition:transform .12s,box-shadow .12s,filter .12s;user-select:none}
.btn:hover{transform:translateY(-2px);filter:brightness(1.15)}
.btn:active{transform:translateY(1px) scale(.96);filter:brightness(.9)}
.btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 60%);border-radius:inherit}

.btn-U {background:linear-gradient(145deg,#ffd600,#c9a800);color:#1a1200;box-shadow:0 4px 16px rgba(255,214,0,.45)}
.btn-Uc{background:linear-gradient(145deg,#c9a800,#8a7200);color:#3a2e00;box-shadow:0 4px 14px rgba(255,214,0,.28)}
.btn-D {background:linear-gradient(145deg,#f0f0f0,#c0c0c0);color:#222;box-shadow:0 4px 16px rgba(200,200,200,.45)}
.btn-Dc{background:linear-gradient(145deg,#c0c0c0,#909090);color:#333;box-shadow:0 4px 14px rgba(200,200,200,.28)}
.btn-F {background:linear-gradient(145deg,#00a015,#005a0c);color:#fff;box-shadow:0 4px 16px rgba(0,160,21,.35)}
.btn-Fc{background:linear-gradient(145deg,#007a10,#003d08);color:#b8ffbf;box-shadow:0 4px 14px rgba(0,160,21,.25)}
.btn-B {background:linear-gradient(145deg,#1565ff,#0a3aaa);color:#fff;box-shadow:0 4px 16px rgba(21,101,255,.4)}
.btn-Bc{background:linear-gradient(145deg,#0a3aaa,#052080);color:#aac4ff;box-shadow:0 4px 14px rgba(21,101,255,.25)}
.btn-R {background:linear-gradient(145deg,#ff7200,#b04e00);color:#fff;box-shadow:0 4px 16px rgba(255,114,0,.4)}
.btn-Rc{background:linear-gradient(145deg,#b04e00,#6a2e00);color:#ffd4a0;box-shadow:0 4px 14px rgba(255,114,0,.25)}
.btn-L {background:linear-gradient(145deg,#e00000,#8a0000);color:#fff;box-shadow:0 4px 16px rgba(220,0,0,.4)}
.btn-Lc{background:linear-gradient(145deg,#8a0000,#4d0000);color:#ffb8b8;box-shadow:0 4px 14px rgba(220,0,0,.25)}

.action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%}
.btn-reset   {background:linear-gradient(145deg,#1f1f3a,#12122a);color:var(--gold);
  border:1px solid rgba(212,175,55,.35);font-size:.75rem;padding:13px}
.btn-scramble{background:linear-gradient(145deg,#2a1f3a,#1a122a);color:#c084fc;
  border:1px solid rgba(192,132,252,.35);font-size:.75rem;padding:13px}
.btn-solve   {background:linear-gradient(145deg,#0a3a2a,#051a12);color:#34d399;
  border:1px solid rgba(52,211,153,.4);font-size:.75rem;padding:13px}
.btn-solve:disabled{opacity:.4;cursor:not-allowed;transform:none!important;filter:none!important}
.btn-solve.solving{background:linear-gradient(145deg,#0a2a3a,#051218);color:#38bdf8;
  border-color:rgba(56,189,248,.4);animation:sPulse 1s ease infinite}
@keyframes sPulse{0%,100%{box-shadow:0 0 8px rgba(52,211,153,.3)}50%{box-shadow:0 0 20px rgba(52,211,153,.7)}}
.btn-label-pair{display:flex;flex-direction:column;align-items:center;gap:2px}
.btn-move{font-size:.82rem}
.btn-arrow{font-size:.6rem;opacity:.7}

.kbd-hint{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-align:center}
.kbd-hint kbd{background:rgba(255,255,255,.07);border:1px solid var(--border);
  border-radius:4px;padding:1px 5px;font-family:inherit}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);
  background:#1a1a30;border:1px solid var(--border);border-radius:12px;
  padding:10px 22px;font-size:.75rem;color:var(--text);
  transition:transform .3s ease,opacity .3s ease;opacity:0;z-index:200}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:700px){
  :root{--half:75px;--cell:46px;--gap:3px}
  .app{padding:12px 10px 28px;gap:14px}
  .header{flex-direction:column;align-items:center;text-align:center;gap:8px}
  .title-block h1{font-size:1.3rem}
  .status-bar{justify-content:center;flex-wrap:wrap;gap:6px}
  .live-dot,.online-count,.my-badge{font-size:.6rem;padding:4px 10px}
  .stage{flex-direction:column;align-items:center;gap:16px}
  .move-log-panel{display:none}
  .cube-viewport{width:210px;height:210px}
  .info-bar{padding:8px 14px;gap:12px}
  .info-value{font-size:1rem}
  .info-key{font-size:.52rem}
  .controls{gap:10px}
  .section-title{font-size:.55rem;margin-bottom:6px}
  .move-grid{grid-template-columns:repeat(6,1fr);gap:5px}
  .btn{padding:10px 2px;font-size:.6rem;border-radius:8px}
  .btn-move{font-size:.78rem}
  .btn-arrow{display:none}
  .action-row{gap:8px}
  .btn-reset,.btn-scramble,.btn-solve{padding:10px 4px;font-size:.62rem}
  .kbd-hint{display:none}
}
</style>
</head>
<body>
<div class="stars"></div>

<div class="overlay" id="overlay">
  <div class="overlay-icon">⧖</div>
  <div class="overlay-text">CONNECTING…</div>
  <div class="overlay-sub">Connecting to Firebase real-time database.</div>
</div>

<div class="app">
  <div class="header">
    <div class="title-block">
      <h1>RUBIK'S <span>CUBE</span></h1>
      <div class="subtitle">Live Multiplayer · Real-time Sync</div>
    </div>
    <div class="status-bar">
      <div class="live-dot"><div class="pulse-dot"></div>LIVE</div>
      <div class="online-count">👥 <span id="onlineCount">—</span>&nbsp;online</div>
      <div class="my-badge" id="myBadge">You: —</div>

  <div class="stage">

    <div class="info-sep"></div>
    <div class="info-item">
      <div class="last-move" id="lastMove">—</div>
      <div class="info-key">Last Move</div>
    </div>

  </div>

  <div class="controls">
    <div style="width:100%">
      <div class="section-title">— Face Rotations —</div>
      <div class="move-grid">
        <button class="btn btn-U"  onclick="doMove('U')"><div class="btn-label-pair"><span class="btn-move">U</span><span class="btn-arrow">↻ CW</span></div></button>
        <button class="btn btn-Uc" onclick="doMove('U\'')"><div class="btn-label-pair"><span class="btn-move">U′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button class="btn btn-R"  onclick="doMove('R')"><div class="btn-label-pair"><span class="btn-move">R</span><span class="btn-arrow">↻ CW</span></div></button>
        <button class="btn btn-Rc" onclick="doMove('R\'')"><div class="btn-label-pair"><span class="btn-move">R′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button class="btn btn-F"  onclick="doMove('F')"><div class="btn-label-pair"><span class="btn-move">F</span><span class="btn-arrow">↻ CW</span></div></button>
        <button class="btn btn-Fc" onclick="doMove('F\'')"><div class="btn-label-pair"><span class="btn-move">F′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button class="btn btn-D"  onclick="doMove('D')"><div class="btn-label-pair"><span class="btn-move">D</span><span class="btn-arrow">↻ CW</span></div></button>
        <button class="btn btn-Dc" onclick="doMove('D\'')"><div class="btn-label-pair"><span class="btn-move">D′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button class="btn btn-L"  onclick="doMove('L')"><div class="btn-label-pair"><span class="btn-move">L</span><span class="btn-arrow">↻ CW</span></div></button>
        <button class="btn btn-Lc" onclick="doMove('L\'')"><div class="btn-label-pair"><span class="btn-move">L′</span><span class="btn-arrow">↺ CCW</span></div></button>
        <button class="btn btn-B"  onclick="doMove('B')"><div class="btn-label-pair"><span class="btn-move">B</span><span class="btn-arrow">↻ CW</span></div></button>
        <button class="btn btn-Bc" onclick="doMove('B\'')"><div class="btn-label-pair"><span class="btn-move">B′</span><span class="btn-arrow">↺ CCW</span></div></button>
      </div>
    </div>
    <div class="action-row">
      <button class="btn btn-reset"    onclick="resetCube()">⟳ RESET</button>
      <button class="btn btn-scramble" onclick="scrambleCube()">⚄ SCRAMBLE</button>
      <button class="btn btn-solve"    onclick="solveCube()" id="solveBtn">★ SOLVE</button>
    </div>
    <div class="kbd-hint">
      <kbd>U</kbd><kbd>D</kbd><kbd>F</kbd><kbd>B</kbd><kbd>R</kbd><kbd>L</kbd>
      + <kbd>Shift</kbd> CCW &nbsp;·&nbsp; <kbd>Space</kbd> scramble &nbsp;·&nbsp; <kbd>Esc</kbd> reset
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
// ─── Firebase wait ───────────────────────────────────────────────────────────
function waitForFB(cb, n=0) {
  if (window._fb) return cb(window._fb);
  if (n > 50) return;
  setTimeout(() => waitForFB(cb, n+1), 100);
}

// ─── State ───────────────────────────────────────────────────────────────────
const COLORS = {W:'#f0f0f0',Y:'#ffd600',G:'#00b518',B:'#1565ff',O:'#ff7200',R:'#e00000'};
const FACES  = ['U','D','F','B','L','R'];
const SOLVED = {
  U:Array(9).fill('Y'), D:Array(9).fill('W'), F:Array(9).fill('G'),
  B:Array(9).fill('B'), L:Array(9).fill('R'), R:Array(9).fill('O')
};
let state = {};
function clone(s) { const c={}; for (const k in s) c[k]=[...s[k]]; return c; }

// ─── Move functions ──────────────────────────────────────────────────────────
function cw(f) { return [f[6],f[3],f[0],f[7],f[4],f[1],f[8],f[5],f[2]]; }

function U_cw(s) {
  s.U = cw(s.U);
  const [a,b,c] = [s.F[0],s.F[1],s.F[2]];
  [s.F[0],s.F[1],s.F[2]] = [s.R[0],s.R[1],s.R[2]];
  [s.R[0],s.R[1],s.R[2]] = [s.B[8],s.B[7],s.B[6]];
  [s.B[8],s.B[7],s.B[6]] = [s.L[0],s.L[1],s.L[2]];
  [s.L[0],s.L[1],s.L[2]] = [a,b,c];
}
function D_cw(s) {
  s.D = cw(s.D);
  const [a,b,c] = [s.F[6],s.F[7],s.F[8]];
  [s.F[6],s.F[7],s.F[8]] = [s.L[6],s.L[7],s.L[8]];
  [s.L[6],s.L[7],s.L[8]] = [s.B[2],s.B[1],s.B[0]];

  s.R = cw(s.R);

  [s.F[2],s.F[5],s.F[8]] = [s.D[2],s.D[5],s.D[8]];

function isSolved() { return FACES.every(f => state[f].every(c => c === state[f][0])); }

// ─── Rendering ───────────────────────────────────────────────────────────────
//
// face-B: scaleX(-1) on the same transform element cancels the rotateY(180deg) H-mirror.
// Works in Chrome, Firefox, Edge. Stickers inserted in normal state order 0-8.

function buildFace(faceName) {
  const el = document.getElementById(`face-${faceName}`);
  el.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const d = document.createElement('div');
    d.className = 'sticker';
    d.style.background = COLORS[state[faceName][i]];
    el.appendChild(d);
  }
}

function updateFace(faceName, prevColors) {
  const el = document.getElementById(`face-${faceName}`);
  const stickers = el.querySelectorAll('.sticker');
  for (let i = 0; i < 9; i++) {
    stickers[i].style.background = COLORS[state[faceName][i]];
    if (prevColors && state[faceName][i] !== prevColors[i]) {
      stickers[i].classList.remove('flash');
      void stickers[i].offsetWidth;
      stickers[i].classList.add('flash');
    }
  }
}

function renderAll(prevState) {
  for (const f of FACES) {
    const el = document.getElementById(`face-${f}`);
    if (!el.children.length) buildFace(f);
    else updateFace(f, prevState ? prevState[f] : null);
  }
  document.getElementById('solvedBadge').classList.toggle('show', isSolved());
}

// ─── UI helpers ──────────────────────────────────────────────────────────────
function addLog(move, avatar, isMe) {
  const log = document.getElementById('moveLog');
  const e = document.createElement('div');
  e.className = 'log-entry' + (isMe ? ' mine' : '');
  e.innerHTML = `<span class="log-avatar">${avatar}</span>`+
    `<span class="log-move">${move}</span>`+
    (isMe ? '<span class="log-you">you</span>' : '');
  log.prepend(e);
  while (log.children.length > 30) log.removeChild(log.lastChild);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── Firebase ────────────────────────────────────────────────────────────────
waitForFB(fb => {
  const {db,ref,set,onValue,cubeRef,moveCountRef,presenceAll,recentRef,myId,myAvatar} = fb;

  document.getElementById('myBadge').textContent = `You: ${myAvatar}`;
  document.getElementById('overlay').classList.add('hidden');

  onValue(presenceAll, snap => {
    document.getElementById('onlineCount').textContent =
      snap.exists() ? Object.keys(snap.val()).length : 0;
  });

  let firstLoad = true;
  onValue(cubeRef, snap => {
    if (!snap.exists()) {
      state = clone(SOLVED);
      set(cubeRef, state);
      renderAll(null);
      firstLoad = false;
      return;
    }
    const remote = snap.val();
    const prev = firstLoad ? null : clone(state);
    for (const f of FACES) {
      state[f] = remote[f]
        ? (Array.isArray(remote[f]) ? remote[f] : Object.values(remote[f]))
        : [...SOLVED[f]];
    }
    renderAll(prev);
    firstLoad = false;
  });

  onValue(moveCountRef, snap => {
    document.getElementById('moveCount').textContent = snap.exists() ? snap.val() : 0;
  });

  let knownKeys = new Set(), logReady = false;
  onValue(recentRef, snap => {
    if (!snap.exists()) return;
    const entries = snap.val();
    if (!logReady) {
      Object.entries(entries).sort((a,b)=>a[1].t-b[1].t).slice(-10).reverse()
        .forEach(([k,e])=>{ knownKeys.add(k); addLog(e.m,e.av,e.id===myId); });
      logReady = true;
    } else {
      Object.entries(entries).filter(([k])=>!knownKeys.has(k))
        .sort((a,b)=>a[1].t-b[1].t)
        .forEach(([k,e])=>{ knownKeys.add(k); if(e.id!==myId) addLog(e.m,e.av,false); });
    }
  });

  // ─── Spam protection ───────────────────────────────────────────────────────
  const MOVE_LIMIT = 5;            // max moves per window
  const MOVE_WINDOW_MS = 1000;     // rolling window in ms
  const SCRAMBLE_COOLDOWN_MS = 5000;
  let moveTimes = [];
  let lastScrambleTime = 0;
  let moveBlocked = false;

  function checkMoveRate() {
    const now = Date.now();
    moveTimes = moveTimes.filter(t => now - t < MOVE_WINDOW_MS);
    if (moveTimes.length >= MOVE_LIMIT) {
      if (!moveBlocked) {
        moveBlocked = true;
        showToast('Slow down! Too many moves at once.');
        setTimeout(() => { moveBlocked = false; }, MOVE_WINDOW_MS);
      }
      return false;
    }
    moveTimes.push(now);
    return true;
  }

  window.doMove = async function(moveName) {
    if (!checkMoveRate()) return;

    const prev = clone(state);
    MOVES[moveName](state);
    renderAll(prev);

    const lm = document.getElementById('lastMove');
    lm.textContent = moveName;
    lm.classList.remove('fade'); void lm.offsetWidth; lm.classList.add('fade');
    addLog(moveName, myAvatar, true);

    await set(cubeRef, clone(state));
    const n = (parseInt(document.getElementById('moveCount').textContent)||0) + 1;
    await set(moveCountRef, n);
    const key = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    await set(ref(db,`cube/recentMoves/${key}`), {m:moveName,av:myAvatar,id:myId,t:Date.now()});
  };

  window.resetCube = async function() {
    if (!confirm('Reset cube for everyone?')) return;
    state = clone(SOLVED);
    renderAll(null);
    await set(cubeRef, clone(state));
    await set(moveCountRef, 0);
    await set(ref(db,'cube/recentMoves'), null);
    document.getElementById('lastMove').textContent = '—';
    document.getElementById('moveLog').innerHTML = '';
    showToast('Cube reset for all players!');
  };

  window.scrambleCube = async function() {
    const now = Date.now();
    const remaining = Math.ceil((SCRAMBLE_COOLDOWN_MS - (now - lastScrambleTime)) / 1000);
    if (now - lastScrambleTime < SCRAMBLE_COOLDOWN_MS) {
      showToast(`Wait ${remaining}s before scrambling again.`);
      return;
    }
    lastScrambleTime = now;
    const keys = Object.keys(MOVES);
    const n = 20 + Math.floor(Math.random()*8);
    const sc = clone(state);
    for (let i=0; i<n; i++) MOVES[keys[Math.floor(Math.random()*keys.length)]](sc);
    await set(cubeRef, sc);
    await set(moveCountRef, (parseInt(document.getElementById('moveCount').textContent)||0) + n);
    showToast(`Scrambled with ${n} moves!`);
  };

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const k = e.key.toUpperCase();
    const map = {U:'U',D:'D',F:'F',B:'B',R:'R',L:'L'};
    if (map[k]) { e.preventDefault(); doMove(e.shiftKey ? `${map[k]}'` : map[k]); }
    if (e.key === ' ') { e.preventDefault(); scrambleCube(); }
    if (e.key === 'Escape') resetCube();
  });
});

// ─── Drag to spin ─────────────────────────────────────────────────────────────
(function(){
  const vp = document.getElementById('cubeVP');
  const sc = document.getElementById('cubeScene');
  let rx=-26, ry=40, drag=false, lx=0, ly=0, vx=0, vy=0, raf=null;
  function apply(){ sc.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`; }
  function inertia(){
    vx*=0.93; vy*=0.93; rx+=vx; ry+=vy;
    rx=Math.max(-80,Math.min(80,rx)); apply();
    if(Math.abs(vx)>.1||Math.abs(vy)>.1) raf=requestAnimationFrame(inertia);
  }
  function start(x,y){ drag=true;lx=x;ly=y;vx=0;vy=0;cancelAnimationFrame(raf);vp.classList.add('dragging');sc.style.transition='none'; }
  function move(x,y){ if(!drag)return; vy=(x-lx)*.4;vx=-(y-ly)*.4;ry+=vy;rx+=vx;rx=Math.max(-80,Math.min(80,rx));lx=x;ly=y;apply(); }
  function end(){ if(!drag)return;drag=false;vp.classList.remove('dragging');raf=requestAnimationFrame(inertia); }
  vp.addEventListener('mousedown',  e=>{e.preventDefault();start(e.clientX,e.clientY);});
  window.addEventListener('mousemove', e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',   end);
  vp.addEventListener('touchstart', e=>{e.preventDefault();start(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  window.addEventListener('touchmove', e=>move(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  window.addEventListener('touchend',  end);
  apply();
})();

// ── IDA* utility (for sub-problems with small search space) ──────────────────
const FI={};

['R',"R'",'R2'].forEach(m=>FI[m]=4);['L',"L'",'L2'].forEach(m=>FI[m]=5);

function idaSearch(s, goalFn, hFn, moveset, maxDepth){
  let found=null;
  function dfs(state,depth,bound,path,lastFace){
    const h=hFn(state);
    const f=path.length+h;
    if(f>bound) return f;
    if(goalFn(state)){found=[...path];return -1;}
    if(depth===0) return f;
    let min=Infinity;
    for(const m of moveset){
      if(FI[m]===lastFace) continue;
      const ns=ap(state,m);
      path.push(m);
      const t=dfs(ns,depth-1,bound,path,FI[m]);
      path.pop();
      if(t===-1) return -1;
      if(t<min) min=t;
    }
    return min;
  }
  let bound=hFn(s);
  while(bound<=maxDepth){
    const t=dfs(s,bound,bound,[],-1);
    if(t===-1) return found;
    if(t===Infinity) return null;
    bound=t;
  }
  return null;
}

// CFOP SOLVER
// Convention: White=W on D face, Yellow=Y on U face, Green=G on F face,
//             Blue=B on B face, Red=R on L face, Orange=O on R face
// ════════════════════════════════════════════════════════════════════════════

// Face indices layout (viewed from outside):
// 0 1 2
// 3 4 5
// 6 7 8

// ── Helpers ──────────────────────────────────────────────────────────────────

// Apply a sequence string like "R U R' U'" (space or comma separated)
function apStr(s,str){
  const moves=str.trim().split(/[\s,]+/).filter(Boolean);
  return apSeq(s,moves);
}
function doStr(s,str){
  const moves=str.trim().split(/[\s,]+/).filter(Boolean);
  for(const m of moves) MF[m](s);
  return moves;
}

// Rotate entire cube: y = U stays, F->R->B->L cycle
function y_cw(s){
  // U gets cw, D gets ccw, then FBLR cycle
  U_cw(s); D_cw(s); D_cw(s); D_cw(s);

// ════════════════════════════════════════════════════════════════════════════
// STEP 1: WHITE CROSS
// Goal: D face edges are white, and each edge's side color matches its center.
// White cross edges (on D face): D[1]=W D[3]=W D[5]=W D[7]=W
// And adjacent: F[7]=G, B[7]=B, L[7]=R, R[7]=O  (using cube orientation)
// ════════════════════════════════════════════════════════════════════════════

// Edge locations: each entry = [ [face,idx],[face,idx] ]
// The 12 edges of the cube:
const EDGE_LOCS = [
  [['U',1],['B',1]], // UB
  [['U',3],['L',1]], // UL
  [['U',5],['R',1]], // UR
  [['U',7],['F',1]], // UF
  [['D',1],['F',7]], // DF
  [['D',3],['L',7]], // DL
  [['D',5],['R',7]], // DR
  [['D',7],['B',7]], // DB  -- note: B face index 7 is adjacent to D[7]
  [['F',3],['L',5]], // FL
  [['F',5],['R',3]], // FR
  [['B',3],['R',5]], // BR
  [['B',5],['L',3]], // BL
];

function getEdge(s,f1,i1,f2,i2){return[s[f1][i1],s[f2][i2]];}

// Find where a specific edge (by its two colors) currently is
// Returns {loc:[[f1,i1],[f2,i2]], colors:[c1,c2]}
function findEdge(s, ca, cb){
  for(const [[f1,i1],[f2,i2]] of EDGE_LOCS){
    const c1=s[f1][i1],c2=s[f2][i2];
    if((c1===ca&&c2===cb)||(c1===cb&&c2===ca)) return {f1,i1,f2,i2,c1,c2};
  }
  return null;
}

// The four white cross edges we need: each has (white + side color)
// and its target position on D: DF(W+G), DR(W+O), DB(W+B), DL(W+R)
// Target: s.D[1]=W,s.F[7]=G | s.D[5]=W,s.R[7]=O | s.D[7]=W,s.B[7]=B | s.D[3]=W,s.L[7]=R
// We'll solve them one at a time using y rotations so the target is always DF.

function whiteCrossSolved(s){
  return s.D[1]==='W'&&s.F[7]==='G'&&
         s.D[3]==='W'&&s.L[7]==='R'&&
         s.D[5]==='W'&&s.R[7]==='O'&&
         s.D[7]==='W'&&s.B[7]==='B';  // note: B[7] is the sticker adjacent to D[7]
         // Actually for the B face adjacent to D: B face index adjacent to D is B[7]
}

// Check if DF edge is solved (W on D[1], correct side color on F[7])
function dfEdgeSolved(s){return s.D[1]==='W'&&s.F[7]==='G';}

// For a given target side color, how many y_cw rotations to bring that center to Front?
// Centers: F[4]=G, R[4]=O, B[4]=B, L[4]=R  (these don't change with y rotation... wait yes they do)
// After y rotations, face identities stay but content rotates, so center colors change.
// We'll just rotate until F[4]==='G' equivalence — but we need to track target.
// Simpler: we work in cube-relative coords. We'll always solve the "current front" edge.

function solveWhiteCross(s){
  const moves=[];
  // The 4 edges: [white_partner_color, number_of_y_rotations_to_bring_its_center_to_front]
  // Initially F=G, R=O, B=B, L=R
  // We rotate the cube (y) to bring each side to front, then solve DF.
  const targets=[
    {side:'G', yRots:0},
    {side:'O', yRots:1},
    {side:'B', yRots:2},
    {side:'R', yRots:3},
  ];
  for(const {side, yRots} of targets){
    // Rotate cube so target side is at Front
    for(let i=0;i<yRots;i++){y_cw(s); moves.push('y');}
    // Now solve the DF white edge (white + G side, where G=F[4] currently)
    const ms=solveOneDFEdge(s);
    moves.push(...ms);
  }
  // Rotate back (we added 0+1+2+3=6 y rotations = net 2, undo with 2 more)
  // Actually track net rotations
  return moves;
}

// Bring the white+F[4] edge to DF position correctly.
// F[4] is the current front center color.
function solveOneDFEdge(s){
  const moves=[];
  const sideColor=s.F[4]; // current front center

  function isDFsolved(){return s.D[1]==='W'&&s.F[7]===sideColor;}

  // Helper: apply moves and record
  function do_(str){const ms=doStr(s,str);moves.push(...ms);}

  // Up to 8 attempts (shouldn't need more)
  for(let attempt=0;attempt<20&&!isDFsolved();attempt++){
    // Find the edge
    const e=findEdge(s,'W',sideColor);
    if(!e) break;
    const {f1,i1,f2,i2,c1,c2}=e;

    // Case: already in D layer
    if(f1==='D'||f2==='D'){
      const df=f1==='D'?f2:f1;
      const di=f1==='D'?i1:i2;
      const si=f1==='D'?i2:i1;
      const sc=f1==='D'?c2:c1;
      // Which D position?
      if(f1==='D'&&i1===1||f2==='D'&&i2===1){
        // DF slot
        if(isDFsolved()) break;
        // Wrong orientation or wrong edge: lift it out
        do_("F2"); continue;
      }
      if(f1==='D'&&i1===5||f2==='D'&&i2===5){
        // DR slot - move to U layer
        do_("R2"); continue;
      }
      if(f1==='D'&&i1===3||f2==='D'&&i2===3){
        // DL slot
        do_("L2"); continue;
      }
      if(f1==='D'&&i1===7||f2==='D'&&i2===7){
        // DB slot
        do_("B2"); continue;
      }
    }

    // Case: in U layer
    if(f1==='U'||f2==='U'){
      const sf=f1==='U'?f2:f1;
      const si_=f1==='U'?i2:i1;
      const sc=f1==='U'?c2:c1;
      const wc=f1==='U'?c1:c2;
      const ui=f1==='U'?i1:i2;

      // Rotate U to bring edge above DF (U[7] is above F)
      // U edges: U[1]=UB, U[3]=UL, U[5]=UR, U[7]=UF
      // We need edge at UF (U[7]/F[1])
      let rotU=0;
      if(ui===7||(sf==='F'&&si_===1)) rotU=0;
      else if(ui===5||(sf==='R'&&si_===1)) rotU=3; // U' brings UR to UF? No: U' rotates U ccw, so R->F
      else if(ui===1||(sf==='B'&&si_===1)) rotU=2;
      else if(ui===3||(sf==='L'&&si_===1)) rotU=1;

      for(let r=0;r<rotU;r++){do_("U"); }

      // Now edge is at UF: U[7]/F[1]
      // Check orientation
      if(s.U[7]==='W'){
        // White on top: F2 inserts it wrongly. Use: F' U' R' U (or just F2 then fix? No.)
        // Actually: white on U[7] means we do: F D F' to bring it down correctly? Let's use:
        // flip it in U layer first: F U R U' then it goes elsewhere, let loop handle
        do_("F U R U'");
      } else {
        // White on F[1], sideColor on U[7]: simple F2 won't work since it goes to D[1] with wrong color
        // Actually F2 will put side color at D[1] and white at F[7]... 
        // We want white at D[1] and side at F[7], so we need it flipped.
        // If s.F[1]===sideColor && s.U[7]==='W' handled above.
        // Here s.F[1]==='W' and s.U[7]===sideColor:
        do_("F'"); // brings it to FR edge... let loop continue
      }
      continue;
    }

    // Case: in middle layer (equator)
    // Middle edges: FL(F[3]/L[5]), FR(F[5]/R[3]), BR(B[3]/R[5]), BL(B[5]/L[3])
    if((f1==='F'&&i1===5)||(f2==='F'&&i2===5)){
      // FR edge
      do_("R U R'"); continue;
    }
    if((f1==='F'&&i1===3)||(f2==='F'&&i2===3)){
      // FL edge
      do_("L' U' L"); continue;
    }
    if((f1==='R'&&i1===5)||(f2==='R'&&i2===5)){
      // BR edge - B[3]/R[5]
      do_("R' U R"); continue;
    }
    if((f1==='L'&&i1===3)||(f2==='L'&&i2===3)){
      // BL edge
      do_("L U' L'"); continue;
    }
    // fallback
    do_("U"); 
  }
  return moves;
}

// ════════════════════════════════════════════════════════════════════════════
// STEP 2: F2L (First Two Layers)
// Solve 4 corner-edge pairs into the four D-layer slots.
// We always work with the FR slot (rotate cube with y to bring each slot to FR).
// ════════════════════════════════════════════════════════════════════════════

// Corner locations (3 stickers each)
const CORNER_LOCS=[
  [['U',0],['L',0],['B',2]], // ULB
  [['U',2],['B',0],['R',2]], // UBR  -- note B orientation
  [['U',6],['F',0],['L',2]], // UFL
  [['U',8],['R',0],['F',2]], // UFR
  [['D',0],['L',6],['F',6]], // DFL (wait, check indices)
  [['D',2],['F',8],['R',6]], // DFR
  [['D',6],['L',8],['B',6]], // wait...
  [['D',8],['R',8],['B',8]], // DBR
];
// Easier: define the 4 bottom corners by their face sticker positions
// DFR corner: D[2], F[8], R[6]
// DFL corner: D[0], F[6], L[8]  -- actually D[0] might be DFL?
// Let me re-examine face layout. D face looking from below (outside):
// When we look at D from below, the index layout mirrors.
// By the move functions: D_cw cycles F[6..8]->R[6..8]->B[2..0]->L[6..8]
// So D corners: D[0]-L[8]-F[6] (DFL from outside D? let's verify with F_cw)
// F_cw cycles U[6..8]->?->D[2..0]->? so D[2] is at the right of D front edge, D[0] left.
// D[0]=DFL, D[2]=DFR, D[6]=DBL, D[8]=DBR
// F[6]=DFL-F sticker, F[8]=DFR-F sticker
// R[6]=DFR-R sticker, R[8]=DBR-R sticker
// L[6]=DBL? -- L_cw cycles F[0,3,6]->U[0,3,6]->B[0,3,6]->D[0,3,6]
// so L[6]=DFL-L, L[8]=DBL-L
// B: B_cw cycles U[0,1,2]->R[2,5,8]->D[8,7,6]->L[0,3,6]
// so B[6]=DBL-B? B[8]=DBR-B

function findCorner(s,ca,cb,cc){
  for(const locs of CORNER_LOCS){
    const colors=locs.map(([f,i])=>s[f][i]);
    const cs=new Set(colors);
    if(cs.has(ca)&&cs.has(cb)&&cs.has(cc)) return locs;
  }
  return null;
}

// Is the FR slot (DFR corner + FR edge) correctly filled?
// DFR corner: D[2]=W, F[8]=G(=F[4]), R[6]=O(=R[4])
// FR edge: F[5]=G, R[3]=O
function frSlotSolved(s){
  return s.D[2]==='W'&&s.F[8]===s.F[4]&&s.R[6]===s.R[4]&&
         s.F[5]===s.F[4]&&s.R[3]===s.R[4];
}

function solveF2L(s){
  const moves=[];
  function do_(str){const ms=doStr(s,str);moves.push(...ms);}

  // Solve each of 4 pairs by rotating cube so each slot is at FR
  for(let slot=0;slot<4;slot++){
    // Rotate to next slot
    if(slot>0){y_cw(s); moves.push('y');}
    const ms=solveFRSlot(s);
    moves.push(...ms);
  }
  return moves;
}

function solveFRSlot(s){
  const moves=[];
  function do_(str){const ms=doStr(s,str);moves.push(...ms);}

  const cornerColors=['W', s.F[4], s.R[4]];
  const edgeColors=[s.F[4], s.R[4]];

  for(let attempt=0;attempt<30&&!frSlotSolved(s);attempt++){
    // If corner or edge is in the slot but wrong, extract them
    const cornerInSlot= s.D[2]==='W'||s.F[8]===s.F[4]||s.R[6]===s.R[4];
    const edgeInSlot= (s.F[5]===s.F[4]&&s.R[3]===s.R[4])||(s.F[5]===s.R[4]&&s.R[3]===s.F[4]);
    // Check if corner is actually the right one in slot
    const rightCornerInSlot= (s.D[2]==='W'&&(s.F[8]===s.F[4]||s.R[6]===s.R[4]));
    const rightEdgeInSlot= s.F[5]===s.F[4]&&s.R[3]===s.R[4];

    if(rightCornerInSlot&&!frSlotSolved(s)){
      // Extract corner
      do_("R U R'"); continue;
    }
    // Find edge
    const e=findEdge(s,s.F[4],s.R[4]);
    const c=findCorner(s,'W',s.F[4],s.R[4]);
    if(!e||!c) break;

    // Check if edge is in middle layer in FR
    // F[5]/R[3]: if colors match edgeColors (possibly flipped), it's in the slot
    if((s.F[5]===s.F[4]&&s.R[3]===s.R[4])||(s.F[5]===s.R[4]&&s.R[3]===s.F[4])){
      if(s.F[5]===s.R[4]&&s.R[3]===s.F[4]){
        // Edge is flipped in slot - extract
        do_("R U R' U' R U R'"); continue;
      }
    }

    // Move edge to U layer if it's in middle layer
    const {f1,i1,f2,i2}=e;
    const inMiddle=(
      (f1==='F'&&i1===3)||(f2==='F'&&i2===3)||
      (f1==='F'&&i1===5)||(f2==='F'&&i2===5)||
      (f1==='R'&&i1===3)||(f2==='R'&&i2===3)||
      (f1==='R'&&i1===5)||(f2==='R'&&i2===5)||
      (f1==='B'&&i1===3)||(f2==='B'&&i2===3)||
      (f1==='B'&&i1===5)||(f2==='B'&&i2===5)||
      (f1==='L'&&i1===3)||(f2==='L'&&i2===3)||
      (f1==='L'&&i1===5)||(f2==='L'&&i2===5)
    );
    if(inMiddle){
      // Extract to U layer using the slot it's in
      if((f1==='F'&&i1===5)||(f2==='F'&&i2===5)) do_("R U R'");
      else if((f1==='F'&&i1===3)||(f2==='F'&&i2===3)) do_("L' U' L");
      else if((f1==='R'&&i1===5)||(f2==='R'&&i2===5)) do_("R' U R");
      else if((f1==='L'&&i1===3)||(f2==='L'&&i2===3)) do_("L U' L'");
      else do_("U");
      continue;
    }

    // Move corner to U layer if it's in D layer (wrong slot)
    const cLocs=c;
    const inD=cLocs.some(([f])=>f==='D');
    if(inD){
      // Extract: find which D position
      const dEntry=cLocs.find(([f])=>f==='D');
      const [,di]=dEntry;
      // D[2]=FR, D[0]=FL, D[6]=BL, D[8]=BR
      if(di===2) do_("R U R'");
      else if(di===0) do_("L' U' L");
      else if(di===6) do_("L U2 L'");
      else do_("R' U2 R");
      continue;
    }

    // Both in U layer - try to pair and insert
    // Attempt BFS-style: try all U rotations and F2L algorithms
    const solved=tryInsertF2L(s,moves);
    if(!solved){
      // Just do U and retry
      do_("U");
    }
  }
  return moves;
}

// Standard F2L insertion cases
// Corner at UFR (U[8]/F[2]/R[0]), Edge at UF(U[7]/F[1]), UR(U[5]/R[1]), UB(U[1]/B[1]), UL(U[3]/L[1])
function tryInsertF2L(s,moves){
  function do_(str){const ms=doStr(s,str);moves.push(...ms);}
  const fc=s.F[4], rc=s.R[4];

  // Try all 4 U rotations
  for(let u=0;u<4;u++){
    // Check corner position
    const cornerAtUFR= (s.U[8]==='W'||s.F[2]===fc||s.R[0]===rc)||(s.U[8]===fc||s.F[2]==='W'||s.R[0]===rc)||(s.U[8]===rc||s.F[2]===fc||s.R[0]==='W');
    const rightCornerAtUFR= new Set([s.U[8],s.F[2],s.R[0]]).has('W')&&new Set([s.U[8],s.F[2],s.R[0]]).has(fc)&&new Set([s.U[8],s.F[2],s.R[0]]).has(rc);

    if(rightCornerAtUFR){
      // Check edge positions and apply appropriate algorithm
      // Case 1: Edge at UF, white on U
      if(s.U[7]===fc&&s.F[1]===rc&&s.U[8]==='W'){
        do_("U' R U R'"); return true;
      }
      if(s.U[7]===rc&&s.F[1]===fc&&s.U[8]==='W'){
        do_("R U' R' U R U' R'"); return true;
      }
      // Case 2: Edge at UR, white on U
      if(s.U[5]===rc&&s.R[1]===fc&&s.U[8]==='W'){
        do_("U R U' R'"); return true;
      }
      if(s.U[5]===fc&&s.R[1]===rc&&s.U[8]==='W'){
        do_("R U R'"); return true; // will loop
      }
      // White on F face of UFR corner
      if(s.F[2]==='W'){
        if(s.U[7]===fc&&s.F[1]===rc){ do_("F' U' F"); return true; }
        if(s.U[5]===rc&&s.R[1]===fc){ do_("R U2 R' U' R U R'"); return true; }
        if(s.U[7]===rc&&s.F[1]===fc){ do_("F' U F"); return true; }
        if(s.U[5]===fc&&s.R[1]===rc){ do_("F' U2 F U F' U' F"); return true; }
      }
      // White on R face of UFR corner
      if(s.R[0]==='W'){
        if(s.U[7]===fc&&s.F[1]===rc){ do_("R' U' R U' R' U R"); return true; }
        if(s.U[7]===rc&&s.F[1]===fc){ do_("R' U R"); return true; }
        if(s.U[5]===rc&&s.R[1]===fc){ do_("R' U2 R U R' U' R"); return true; }
        if(s.U[5]===fc&&s.R[1]===rc){ do_("R' U R U2 R' U R"); return true; } // hmm
      }
    }
    // Rotate U and try again
    do_("U");
  }
  return false;
}

function findEdge(s,ca,cb){
  const locs=[
    [['U',1],['B',1]],[['U',3],['L',1]],[['U',5],['R',1]],[['U',7],['F',1]],
    [['D',1],['F',7]],[['D',3],['L',7]],[['D',5],['R',7]],[['D',7],['B',7]],
    [['F',3],['L',5]],[['F',5],['R',3]],[['B',3],['R',5]],[['B',5],['L',3]],
  ];
  for(const [[f1,i1],[f2,i2]] of locs){
    const c1=s[f1][i1],c2=s[f2][i2];
    if((c1===ca&&c2===cb)||(c1===cb&&c2===ca)) return {f1,i1,f2,i2,c1,c2};
  }
  return null;
}

// ════════════════════════════════════════════════════════════════════════════
// STEP 3: OLL (Orientation of Last Layer)
// Make the entire top face yellow.
// We do it in two sub-steps: first the yellow cross, then full OLL.
// ════════════════════════════════════════════════════════════════════════════

function ollCrossSolved(s){
  return s.U[1]==='Y'&&s.U[3]==='Y'&&s.U[5]==='Y'&&s.U[7]==='Y';
}
function ollSolved(s){return s.U.every(c=>c==='Y');}

// OLL cross: get all 4 U edges to yellow.
// Patterns based on how many yellow edges are currently on top.
function solveOLLCross(s){
  const moves=[];
  function do_(str){const ms=doStr(s,str);moves.push(...ms);}
  const FURU="F U R U' R' F'";
  const FRUR="F R U R' U' F'";

  for(let attempt=0;attempt<8&&!ollCrossSolved(s);attempt++){
    const top=[s.U[1]==='Y',s.U[3]==='Y',s.U[5]==='Y',s.U[7]==='Y'];
    const cnt=top.filter(Boolean).length;

    if(cnt===0){
      // Dot case
      do_(FURU); do_(FRUR); continue;
    }
    if(cnt===2){
      // Line or L-shape
      // Check for line: [1]&[7] or [3]&[5]
      if(top[0]&&top[2]){ // [1]&[7] = FB line (indices 1=UB,7=UF? let me recheck)
        // U[1]=UB side, U[7]=UF side, U[3]=UL, U[5]=UR
        // Line horizontal (UF+UB): U[1]&&U[7]
        do_(FRUR); continue;
      }
      if(top[1]&&top[3]){ // UL+UR line
        do_("U"); continue; // rotate to make it FB line
      }
      // L-shape: rotate until L is in standard position (UF+UR = top[2]&&top[3])
      // Standard L: U[5]&&U[7] (UR and UF yellow)
      if(top[2]&&top[3]) { do_(FURU); continue; }
      do_("U"); continue;
    }
    do_("U");
  }
  return moves;
}

// Full OLL: 57 cases. We'll use a lookup approach with BFS for up to 3 moves.
// OLL state = orientation of 8 U-face stickers (corners 0,2,6,8 and edges 1,3,5,7)
// plus 8 side stickers that are on the top layer.
// We encode the OLL case and apply the right algorithm.

// OLL algorithms (subset covering all 57 cases, using CFOP standard algs)
// Each entry: [condition_function, algorithm_string]
// We'll use a BFS with U rotations + the CFOP OLL algorithms.

function solveOLL(s){
  const moves=[];
  function do_(str){const ms=doStr(s,str);moves.push(...ms);}

  if(ollSolved(s)) return moves;

  // Encode OLL: which of the 9 U stickers are yellow, and which of the 8 side-top stickers
  // Side-top: F[0],F[2], R[0],R[2], B[0],B[2], L[0],L[2]  (top row of each side face)
  // Actually top of F face visible from top: F[0]=UFL-F, F[2]=UFR-F (corners)
  // and F[1]=UF edge top... wait that's U[7]. 
  // The 8 stickers of adjacent faces in top layer:
  // F[0],F[1],F[2] = top row of F face (but F[1] is the UF edge side sticker)
  // For OLL we care about orientation: is yellow on top for each U-layer cubie?
  // Simpler: just try all OLL algs until top is solved.

  const OLL_ALGS = [
    // Sune
    "R U R' U R U2 R'",
    // Anti-sune
    "R U2 R' U' R U' R'",
    // Pi (Bruno)
    "R U2 R2 U' R2 U' R2 U2 R",
    // H OLL
    "R U R' U R U' R' U R U2 R'",
    // T shape
    "R U R' U' R' F R F'",
    // OLL cross algs (F triggers)
    "F R U R' U' F'",
    "F U R U' R' F'",
    // More OLL cases (pure, no r/l/M)
    "F R' F' R U R U' R'",
    "R U R' U' R' F R F'",
    "R' U' R U' R' U R U R' U' R U2 R' U' R U' R'",
    "R U R' U R U2 R' F R U R' U' F'",
    "L' U' L U' L' U2 L",
    "L' U2 L U L' U' L",
    "R' U' R U' R' U2 R",
    "R U R' U' R U' R' F' U' F R U R'",
    "F R U R' U' F' R U R' U' R' F R F'",
    "R' U' R' F R F' R' F R F' U R",
    "R2 D R' U2 R D' R' U2 R'",
    "R' U2 R2 U R' U R U2 R' U' R U' R'",
    "R' F R F' U' F' U F",
    "F' U' F U' R U R'",
    "R U R' U' R U R' U' R U R' F' R U R' U' F",
    "R' U R U2 R' U' R U' R'",
    "R U' R' U' R U R' F' R U R' U' F",
    "F R' F' R U R U' R'",
    "R U R' U R U' R' U' R' F R F'",
    "L F' L' F U F U' F'",
    "R' F R F' U F' U' F",
    "F U R U2 R' U R U' R' F'",
    "R' U' F' U F R",
    "L U F U' F' L'",
    "R U2 R' U' R U' R' L' U2 L U L' U L",
    "R U R' U' R' F R2 U R' U' F'",
    "F' L' U' L U L' U' L U F",
    "R' U2 R U R' U R",
    "F R U' R' U' R U R' F'",
    "R U R' U' R' F R F' R U R' U' R' F R F'",
    "R U2 R2 F R F' U2 R' F R F'",
    "L' U' L U' L' U L U L F' L' F",
    "R U R' U' R' F R2 U' R' U F'",
    "F' R U R' U' R' F R2 U' R' U' R U R' U R",
    "R' U' R U' R' U R U L U' R' U L'",
    "R' U2 R' F R F' R' F R F' U2 R",
    "R' U' F R U R' U' R' F' R2 U' R' U' R U R' U R",
    "R U2 R' U' F' U F R U R' U' R U2 R' U' R' F R F'",
  ];

  // Try each alg with 4 AUF rotations
  for(let attempt=0;attempt<6&&!ollSolved(s);attempt++){
    for(let u=0;u<4;u++){
      if(ollSolved(s)) return moves;
      for(const alg of OLL_ALGS){
        const test=apStr(s,alg);
        if(ollSolved(test)){
          do_(alg);
          return moves;
        }
        // Try with AUF before
        for(let ua=1;ua<4;ua++){
          const uMoves=['U','U2',"U'"][ua-1];
          const test2=apStr(apStr(s,uMoves),alg);
          if(ollSolved(test2)){
            do_(uMoves); do_(alg); return moves;
          }
        }
      }
      do_("U");
    }
    // If still not solved after all algs, apply a sune and retry
    do_("R U R' U R U2 R'");
  }
  return moves;
}

// ════════════════════════════════════════════════════════════════════════════
// STEP 4: PLL (Permutation of Last Layer)
// Permute U layer pieces to solve the cube.
// ════════════════════════════════════════════════════════════════════════════

function pllSolved(s){
  return ['U','D','F','B','L','R'].every(f=>s[f].every(c=>c===s[f][4]));
}

function solvePLL(s){
  const moves=[];
  function do_(str){const ms=doStr(s,str);moves.push(...ms);}

  if(pllSolved(s)) return moves;

  const PLL_ALGS = [
    // Ua perm
    "R U' R U R U R U' R' U' R2",
    // Ub perm
    "R2 U R U R' U' R' U' R' U R'",
    // Z perm (pure, no M)
    "R' U' R U' R U R U' R' U R U R2 U' R'",
    // H perm (pure, no M)
    "R2 U2 R U2 R2 U2 R2 U2 R U2 R2",
    // Aa perm (pure, no x)
    "R' F R' B2 R F' R' B2 R2",
    // Ab perm (pure, no x)
    "R2 B2 R F R' B2 R F' R",
    // E perm (pure, no x)
    "R B' R' F R B R' F' R B R' F R B' R' F'",
    // F perm
    "R' U' F' R U R' U' R' F R2 U' R' U' R U R' U R",
    // Ga perm
    "R2 U R' U R' U' R U' R2 D U' R' U R D'",
    // Gb perm
    "R' U' R U D' R2 U R' U R U' R U' R2 D",
    // Gc perm
    "R2 F2 R U2 R U2 R' F R U R' U' R' F R2",
    // Gd perm
    "R U R' U' D R2 U' R U' R' U R' U R2 D'",
    // Ja perm (pure, no x)
    "L' U' L F L' U' L U L F' L2 U L",
    // Jb perm
    "R U R' F' R U R' U' R' F R2 U' R'",
    // Na perm
    "R U R' U R U R' F' R U R' U' R' F R2 U' R' U2 R U' R'",
    // Nb perm
    "R' U L' U2 R U' L R' U L' U2 R U' L U2",
    // Ra perm
    "R U' R' U' R U R D R' U' R D' R' U2 R'",
    // Rb perm
    "R2 F R U R U' R' F' R U2 R' U2 R",
    // T perm
    "R U R' U' R' F R2 U' R' U' R U R' F'",
    // V perm (pure, no d)
    "R' U R' U' B' R' B2 U' B' U B' R B R",
    // Y perm
    "F R U' R' U' R U R' F' R U R' U' R' F R F'",
  ];

  for(let attempt=0;attempt<8&&!pllSolved(s);attempt++){
    let applied=false;
    for(let u=0;u<4&&!applied;u++){
      for(const alg of PLL_ALGS){
        const test=apStr(s,alg);
        if(pllSolved(test)){
          if(u>0){const uStr=u===1?'U':u===2?'U2':"U'";do_(uStr);}
          do_(alg);
          applied=true;
          break;
        }
      }
      if(!applied){do_("U");}
    }
    if(!applied){
      // AUF after
      for(let u=1;u<4;u++){
        const uStr=u===1?'U':u===2?'U2':"U'";
        const test=apStr(s,uStr);
        if(pllSolved(test)){do_(uStr);applied=true;break;}
      }
    }
    if(!applied){
      // Apply T-perm and retry
      do_("R U R' U' R' F R2 U' R' U' R U R' F'");
    }
  }

  // Final AUF
  for(let u=0;u<4;u++){
    if(pllSolved(s)) break;
    do_("U");
  }

  return moves;
}

// ════════════════════════════════════════════════════════════════════════════
// MAIN CFOP SOLVE
// ════════════════════════════════════════════════════════════════════════════

function cfopSolve(s){
  let moves=[];

  // Step 1: White Cross
  const crossMoves=solveWhiteCross(s);
  moves.push(...crossMoves);

  // Step 2: F2L
  const f2lMoves=solveF2L(s);
  moves.push(...f2lMoves);

  // Step 3a: OLL Cross
  const ollCrossMoves=solveOLLCross(s);
  moves.push(...ollCrossMoves);

  // Step 3b: Full OLL
  const ollMoves=solveOLL(s);
  moves.push(...ollMoves);

  // Step 4: PLL
  const pllMoves=solvePLL(s);
  moves.push(...pllMoves);

  // Remove y rotations from output (they were used internally)
  // Actually we need to keep only real moves (not y rotations as the main
  // cube won't understand y). Let's replace y moves with equivalent U/D/F/B/L/R.
  // We tracked y rotations in solveWhiteCross/solveF2L — we should NOT include them
  // in the returned move list since the cube's doMove doesn't know 'y'.
  // Instead, let's filter them out AND convert all subsequent moves accordingly.
  // Actually, since we mutated s as we went, the y rotations are already baked into
  // the state — the real issue is we can't send 'y' to doMove on the main thread.
  // The y moves were applied to s internally, so the remaining moves after them
  // ARE correct for the rotated orientation. We need to convert them.
  // Simplest fix: don't include 'y' in output, and instead replace 'y' with
  // the cube-rotation equivalent using only standard moves.
  // y = U D' and middle M... but M is not in our moveset.
  // y = D' U ... actually y (F->R) = U + front-layer: not clean.
  // Real solution: rewrite so y rotations are absorbed into the move sequence.
  // For now: convert y to U moves (since D layer is solved, y ~ U rotation visually)
  // but that's wrong. Let's just re-filter and use a remapping approach.

  // Remap moves: track cumulative y rotation offset (0-3) and remap face letters
  const faceMap = [
    ['F','R','B','L'], // index = yRotOffset: F->F, R->R, B->B, L->L at offset 0
    ['F','R','B','L'], // at offset 1 (1x y_cw): what was L is now F, etc.
  ];
  // y_cw: F->R, R->B, B->L, L->F (from the perspective of cube rotation)
  // Inverse: to un-rotate a move after y_cw, F->L, R->F, B->R, L->B
  const Y_MAP_CW = {F:'L',L:'B',B:'R',R:'F',U:'U',D:'D'}; // move face after 1 y_cw
  // Actually: if cube rotates y_cw (F goes to where R was), then an R move on the
  // new orientation corresponds to a B move on the old orientation.
  // The FORWARD map (new->old): F->R, R->B, B->L, L->F (inverse of cube rotation)
  // Let's define: after n y_cw rotations, a move on face X corresponds to:
  const YN=[
    {F:'F',R:'R',B:'B',L:'L'}, // 0 rotations
    {F:'L',R:'F',B:'R',L:'B'}, // 1 y_cw: new F is old R, so F move -> old R direction.. 
    {F:'B',R:'L',B:'F',L:'R'}, // 2
    {F:'R',R:'B',B:'L',L:'F'}, // 3
  ];
  // Wait - need to think carefully.
  // After y_cw, what was F face is now at L position (cube rotated so F goes right to R).
  // Hmm: y_cw in our code swaps: s.F->s.R->s.B->s.L->s.F (new F = old L).
  // So after 1 y_cw: new F content = old L, new R content = old F, new B = old R, new L = old B.
  // A move "F" after y_cw acts on what is now F (old L). To produce same physical effect, use "L".
  // Remap (new face name -> old face name): F->L, R->F, B->R, L->B.
  const YFW=[
    {F:'F',R:'R',B:'B',L:'L',U:'U',D:'D'},
    {F:'L',R:'F',B:'R',L:'B',U:'U',D:'D'}, // after 1 y_cw
    {F:'B',R:'L',B:'F',L:'R',U:'U',D:'D'}, // after 2
    {F:'R',R:'B',B:'L',L:'F',U:'U',D:'D'}, // after 3
  ];

  let yOff=0;
  const outMoves=[];
  for(const m of moves){
    if(m==='y'){yOff=(yOff+1)%4; continue;}
    if(m==='y2'){yOff=(yOff+2)%4; continue;}
    if(m==="y'"){yOff=(yOff+3)%4; continue;}
    // Remap the face in this move
    const map=YFW[yOff];
    const remapped=m.replace(/^[FRBL]/,face=>map[face]||face);
    outMoves.push(remapped);
  }
  return outMoves;
}

function isSolved(s){return ['U','D','F','B','L','R'].every(f=>{const c=s[f][4];return s[f].every(v=>v===c);});}

self.onmessage=function(e){
  const s=e.data;
  if(isSolved(s)){self.postMessage({solution:[]});return;}
  try{
    const sol=cfopSolve(clone(s));
    // Verify
    const verify=clone(s);
    for(const m of sol) MF[m](verify);
    if(isSolved(verify)){
      self.postMessage({solution:sol});
    } else {
      self.postMessage({error:'CFOP verification failed.'});
    }
  } catch(err){
    self.postMessage({error:'Solver error: '+err.message});
  }
};
`;
let worker=null;
window.solveCube = async function() {
  if (isSolved()) { showToast('Already solved!'); return; }
  const btn = document.getElementById('solveBtn');
  btn.disabled=true; btn.classList.add('solving'); btn.textContent='⏳ Solving…';
  showToast('Calculating…');
  if (worker) { worker.terminate(); worker=null; }
  worker = new Worker(URL.createObjectURL(new Blob([W],{type:'application/javascript'})));
  const snap = clone(state);
  const sol = await new Promise((res,rej)=>{
    worker.onmessage = e => { worker.terminate(); worker=null;
      e.data.error ? rej(new Error(e.data.error)) : res(e.data.solution); };
    worker.onerror  = err => { worker.terminate(); worker=null; rej(err); };
    worker.postMessage(snap);
  }).catch(err => {
    showToast(err.message||'Could not solve.'); btn.disabled=false;
    btn.classList.remove('solving'); btn.textContent='★ SOLVE'; return null;
  });
  if (!sol) return;
  if (!sol.length) { showToast('Already solved!'); btn.disabled=false; btn.classList.remove('solving'); btn.textContent='★ SOLVE'; return; }
  showToast(`Solution: ${sol.length} moves!`);
  btn.textContent = `▶ ${sol.length} moves…`;
  for (let i=0; i<sol.length; i++) {
    await new Promise(r=>setTimeout(r,750));
    await doMove(sol[i]);
    btn.textContent = i<sol.length-1 ? `▶ ${sol.length-i-1} left…` : '★ SOLVE';
  }
  btn.disabled=false; btn.classList.remove('solving'); btn.textContent='★ SOLVE';
};
})();
